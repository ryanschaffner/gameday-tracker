    border:1px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;font-size:23px;}
  .eyebrow{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;opacity:.66;font-weight:800;}
  header h1{margin:1px 0 0;font-size:20px;font-weight:800;letter-spacing:.2px;line-height:1.1;}
  header .sub{font-size:12px;opacity:.82;margin-top:1px;}
  .wrap{max-width:620px;margin:0 auto;padding:14px 12px;}
  /* bottom nav */
  nav.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:saturate(1.2) blur(6px);
    border-top:1px solid var(--line);display:flex;z-index:30;box-shadow:0 -2px 14px rgba(20,30,60,.07);}
  nav.tabbar button{flex:1;background:none;border:none;padding:9px 4px 8px;font-size:11px;
    color:var(--muted);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  nav.tabbar button .ic{font-size:19px;line-height:1;}
  nav.tabbar button.active{color:var(--green);}
  /* cards & buttons */
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;margin:11px 0;
    box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{margin:0 0 4px;font-size:16px;}
  .btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px 16px;
    font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn:active{opacity:.85;}
  .btn.wide{width:100%;justify-content:center;}
  .btn.ghost{background:#fff;color:var(--green-dark);border:1px solid var(--line);}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px;}
  .btn.red{background:#fdecea;color:#c62828;border:1px solid #f5c6c0;}
  .row{display:flex;align-items:center;gap:9px;}
  .between{justify-content:space-between;}
  .muted{color:var(--muted);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--green-light);color:var(--green-dark);}
  .clockcard{padding:12px 14px;}
  .clocktime{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green-dark);letter-spacing:.5px;}
  .clockcard.warn .clocktime{color:#c0392b;}
  .clockcard.done{background:#fdecea;border-color:#f0a8a0;}
  .clockcard.done .clocktime{color:#c62828;}
  /* font-size must be >=16px on all form fields — below that, iOS Safari auto-zooms the whole
     page when the field is focused, which is what made the date field look like it was
     "escaping" its card and made the page feel too wide after tapping any input. */
  input,select{font-size:16px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%;min-width:0;}
  /* Reset native appearance only on text-like/date fields — leaves checkboxes/radios (native
     checkmark would disappear) and selects (native dropdown arrow would disappear) alone. */
  input:not([type="checkbox"]):not([type="radio"]){-webkit-appearance:none;appearance:none;}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 3px;text-transform:uppercase;letter-spacing:.4px;}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:14px;}
  /* attendance */
  .pl{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin:6px 0;background:#fff;}
  .pl .ord{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .pl .ord.off{background:#e6ece8;color:var(--muted);}
  .pl .nm{flex:1;font-weight:600;font-size:15px;}
  .pl.absent{opacity:.7;background:#fafafa;}
  /* field — clean light pitch */
  .field{position:relative;background:linear-gradient(180deg,#fbfcff,#f1f4fa);border:1px solid var(--line);
    border-radius:16px;height:438px;margin:8px 0;overflow:hidden;box-shadow:inset 0 0 22px rgba(30,58,138,.05);}
  .field .ln{position:absolute;left:8px;right:8px;top:50%;height:2px;background:#d6dcec;}
  .field .cir{position:absolute;left:50%;top:50%;width:72px;height:72px;transform:translate(-50%,-50%);border:2px solid #d6dcec;border-radius:50%;}
  .field .cir::after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;background:#d6dcec;border-radius:50%;transform:translate(-50%,-50%);}
  .field .pbox{position:absolute;left:50%;transform:translateX(-50%);width:140px;height:46px;border:2px solid #d6dcec;}
  .field .pbox.b{bottom:0;border-bottom:none;border-radius:0 0 6px 6px;}
  .field .pbox.t{top:0;border-top:none;border-radius:6px 6px 0 0;}
  .field::before{content:"";position:absolute;left:50%;top:6px;transform:translateX(-50%);width:54px;height:14px;border:2px solid #dde2ee;border-top:none;}
  .field::after{content:"";position:absolute;left:50%;bottom:6px;transform:translateX(-50%);width:54px;height:14px;border:2px solid #dde2ee;border-bottom:none;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:64px;cursor:pointer;text-align:center;z-index:2;}
  .jrsy{display:block;margin:0 auto;filter:drop-shadow(0 3px 4px rgba(20,30,60,.22));}
  .slot .pos{font-size:10px;color:var(--muted);font-weight:800;margin-top:1px;letter-spacing:.3px;}
  .slot .who{font-size:11px;color:var(--ink);font-weight:700;line-height:1.05;margin-top:0;}
  .slot .wasname{font-size:9px;color:var(--f);opacity:.9;font-weight:700;line-height:1.05;margin-top:1px;}
  /* Positioned absolute (not in normal flow) so a sub tag never grows the slot's own box height —
     .slot is centered on its pitch coordinate via translate(-50%,-50%), so a taller box would push
     extra height down into whatever slot sits below it on the field, covering its minutes badge. */
  .slot .tag{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:2px;white-space:nowrap;
    font-size:9px;color:#fff;font-weight:800;background:var(--green);border-radius:8px;padding:1px 6px;z-index:3;}
  /* tired toggle — a real tap target on the jersey, not just a passive indicator */
  .tiredbtn{position:absolute;top:-6px;right:-2px;font-size:13px;background:#fff;border:1px solid var(--line);
    border-radius:50%;line-height:1;padding:0;box-shadow:0 1px 3px rgba(0,0,0,.3);opacity:.4;cursor:pointer;
    z-index:4;-webkit-appearance:none;appearance:none;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
  .tiredbtn.active{opacity:1;background:#fdecea;border-color:#f0a8a0;}
  /* live minutes badge on each field slot — "this quarter' / whole-game'" */
  .minbadge{position:absolute;top:-6px;left:-2px;font-size:9.5px;font-weight:800;background:var(--gold);color:#3a2a00;
    border-radius:8px;padding:1px 5px;line-height:1.3;box-shadow:0 1px 3px rgba(0,0,0,.25);white-space:nowrap;z-index:3;}
  .minbadge small{font-weight:700;opacity:.8;font-size:8.5px;}
  .slot.dragover .jrsy{transform:scale(1.12);filter:drop-shadow(0 5px 8px rgba(20,30,60,.35));}
  .bench.benchover{outline:2px dashed var(--green);outline-offset:2px;border-radius:10px;}
  .dragbubble{position:fixed;z-index:90;left:0;top:0;background:var(--green);color:#fff;padding:7px 13px;border-radius:20px;
    font-weight:800;font-size:13px;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 6px 16px rgba(0,0,0,.35);}
  [data-drag]{touch-action:none;}
  body.dragging{user-select:none;-webkit-user-select:none;}
  .chip[data-drag]{cursor:grab;}
  .ltools{background:#f5f7fc;border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-top:12px;}
  .ltlabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .fillgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px;}
  .fillgrid .btn{justify-content:center;width:100%;}
  .st{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap;}
  .st-short{background:#fff3e0;color:#a05a00;border:1px solid #f0c98a;}
  .st-on{background:var(--green-light);color:var(--green-dark);border:1px solid #bfe3c5;}
  .st-over{background:#e7f0fb;color:#1a466e;border:1px solid #bcd9f5;}
  .suggest{background:#eef6ff;border:1px solid #bcd9f5;border-radius:11px;padding:11px 12px;margin:10px 0 2px;font-size:13.5px;color:#1a466e;}
  .suggest b{color:#0d3b66;}
  .gkbadge{font-size:11px;font-weight:800;color:#a87913;background:#fff6e0;border:1px solid #f0d489;border-radius:14px;padding:1px 7px;margin-left:6px;}
  /* bench */
  .bench{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{background:#eef4f0;border:1px solid var(--line);border-radius:18px;padding:5px 11px;font-size:13px;font-weight:600;}
  .chip.warn{background:#fff3e0;border-color:#f0c98a;color:#a05a00;}
  .chip.tired{background:#fdecea;border-color:#f0a8a0;color:#c62828;cursor:pointer;}
  .chip[onclick]{cursor:pointer;}
  .chipmin{color:var(--muted);font-weight:700;}
  /* qtabs */
  .qtabs{display:flex;gap:5px;margin:4px 0 8px;}
  .qtabs button{flex:1;padding:9px 4px;border:1px solid var(--line);background:#fff;border-radius:9px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer;}
  .qtabs button.active{background:var(--green);color:#fff;border-color:var(--green);}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
  th,td{padding:6px 3px;text-align:center;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis;}
  td.name,th.name{white-space:normal;}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);}
  td.name,th.name{text-align:left;font-weight:600;width:30%;white-space:normal;}
  tr.low td{background:#fff7ed;}
  .barwrap{background:#eef4f0;border-radius:5px;height:8px;overflow:hidden;width:100%;min-width:46px;}
  .bar{height:100%;background:var(--green);}
  /* sub log */
  .sub-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f5f7fc;border:1px solid var(--line);border-radius:9px;margin:6px 0;font-size:13.5px;}
  .sub-item .t{font-weight:800;color:var(--green-dark);}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  .overlay.hidden{display:none;}
  .sheet{background:#fff;width:100%;max-width:620px;border-radius:18px 18px 0 0;padding:16px 16px 26px;max-height:82vh;overflow:auto;}
  .sheet h3{margin:0 0 10px;font-size:16px;}
  .pickrow{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:10px;margin:6px 0;cursor:pointer;font-weight:600;}
  .pickrow .ord{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .pickrow.clear{color:#c62828;justify-content:center;}
  .note{font-size:12.5px;color:var(--muted);background:var(--green-light);border-radius:9px;padding:9px 11px;margin:8px 0;}
  .toolbtns{display:flex;gap:6px;flex-wrap:wrap;}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 2px 6px;}
  /* ---- minutes-tracker card (Playing-time list + Live quarter strip) ---- */
  .mt-legend{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-size:12px;font-weight:700;color:var(--muted);margin:2px 2px 12px;}
  .mt-lg{display:flex;align-items:center;gap:5px;}
  .mt-sw{width:10px;height:10px;border-radius:3px;display:inline-block;flex:0 0 auto;}
  .mt-sw.gk{background:var(--gk);} .mt-sw.d{background:var(--d);} .mt-sw.m{background:var(--m);} .mt-sw.f{background:var(--f);}
  .mt-sep{opacity:.45;}
  .mt-row{display:flex;align-items:flex-start;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .mt-row:last-child{border-bottom:none;}
  .mt-badge{width:38px;height:38px;border-radius:50%;background:var(--green-dark);color:#fff;font-weight:800;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .mt-badge.gk{background:var(--gk);}
  .mt-info{flex:1;min-width:0;}
  .mt-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .mt-name{font-weight:700;font-size:15px;color:var(--ink);}
  .mt-gktag{font-size:10.5px;font-weight:800;color:var(--gk);margin-left:5px;}
  .mt-right{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .mt-mins{font-weight:800;font-size:16px;}
  .mt-pill{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .mt-pill.short{background:#fdecea;color:#c62828;}
  .mt-pill.on{background:#e7f6ec;color:#1b7a3d;}
  .mt-pill.over{background:#fff3e0;color:#a05a00;}
  .mt-pill.keeper{background:var(--green-light);color:var(--gk);}
  /* Stacked bar: .mt-track clips its segments to rounded corners; .mt-tick is a sibling (not a
     child of the clipped track) so it can hang slightly above/below without being cut off. */
  .mt-bar{position:relative;height:8px;margin-top:7px;}
  .mt-track{position:absolute;inset:0;border-radius:5px;background:#eef1f8;overflow:hidden;}
  .mt-seg{position:absolute;top:0;bottom:0;}
  .mt-tick{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--ink);opacity:.35;border-radius:1px;}
  .mt-sub{font-size:11px;color:var(--muted);margin-top:5px;}
  .mt-row.tired{background:#fdecea;border-radius:10px;margin:0 -8px;padding:12px 8px;}
  .roster-row{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:8px 0;padding:10px 11px;}
  body.dark .mt-row.tired{background:#2a1414;}
  body.dark .mt-badge{background:#232c46;}
  body.dark .mt-track{background:#1c2338;}
  body.dark .mt-pill.short{background:#3a1a1a;color:#f4776d;}
  body.dark .mt-pill.on{background:#123321;color:#4ade80;}
  body.dark .mt-pill.over{background:#3a2a10;color:#f0b23c;}
  body.dark .mt-pill.keeper{background:#152036;color:var(--gk);}
  body.dark .mt-tick{background:#fff;opacity:.4;}
  /* ---- dark mode ---- */
  body.dark{
    --green:#4c7ef2; --green-dark:#bcd0ff; --green-light:#1c2947;
    --ink:#e8ecf8; --muted:#8b93b3; --line:#2a3350; --bg:#0b0f1c; --card:#141b30;
    --gk:#5b9bf0; --d:#34d399; --m:#f0b23c; --f:#f4776d; --gold:#e0a426;
    color-scheme:dark;
  }
  body.dark header{background:linear-gradient(150deg,#141c3a 0%,#0a1024 70%,#060a18 100%);}
  body.dark nav.tabbar{background:rgba(13,17,30,.96);}
  body.dark .qtabs button{background:var(--card);color:var(--muted);}
  body.dark .btn.ghost{background:var(--card);color:var(--ink);}
  body.dark input,body.dark select,body.dark textarea{background:#0e1526;color:var(--ink);border-color:var(--line);}
  body.dark .pl,body.dark .sheet,body.dark .ltools,body.dark .sub-item{background:var(--card);}
  body.dark .pl{border-color:var(--line);}
  body.dark .pl.absent{background:#10162a;}
  body.dark .pl .ord.off{background:#232c46;color:var(--muted);}
  body.dark .field{background:linear-gradient(180deg,#101830,#0a1122);box-shadow:inset 0 0 22px rgba(0,0,0,.35);}
  body.dark .field .ln{background:#28335a;}
  body.dark .field .cir,body.dark .field .pbox,body.dark .field::before,body.dark .field::after{border-color:#28335a;}
  body.dark .field .cir::after{background:#28335a;}
  body.dark .chip{background:#182238;color:var(--ink);}
  body.dark .barwrap{background:#182238;}
  body.dark tr.low td{background:#241c14;}
  body.dark .tiredbtn{background:#141b30;}
  body.dark .tiredbtn.active{background:#3a1a1a;border-color:#5a2a2a;}
  body.dark .gkbadge{background:#2a2210;color:#e0b95a;border-color:#4a3a12;}
  body.dark .suggest{background:#101f33;color:#bcd9f5;border-color:#1f3a5a;}
  body.dark .suggest b{color:#dff0ff;}
  body.dark .note{background:#1c2947;}
</style>
</head>

// All formation keys of a given total-player size (GK + outfield), largest-size-first for

function formationsOfSize(n){ return Object.keys(FORMATIONS).filter(k=>FORMATIONS[k].size===n); }
// Best-fit formation for however many players are actually present. Prefers an exact match
// (8/7/6); if present count doesn't land exactly on one of those, uses the largest supported
// size that doesn't exceed it, so we never assume more players than are there. Below 6, falls
// back to the smallest supported shape (6v6) — some slots will just show as open, same as today.
function bestFormationFor(n){
  const sizes=[8,7,6];
  let target=sizes.find(s=>s===n);
  if(!target) target=sizes.filter(s=>s<=n).sort((a,b)=>b-a)[0] || 6;
  const cur=state.settings.defaultFormation;
  if(FORMATIONS[cur] && FORMATIONS[cur].size===target) return cur;
  return formationsOfSize(target)[0];
}

//// ---------- State ----------
const KEY = "soccerGameTrackerV1";

let state, ui = {view:"games", gameId:null, qi:0, dismissedAlerts:{}, activeSubAlert:null, _lastAlertKey:undefined, massOverride:{}};

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function uid(p){ return p+Math.random().toString(36).slice(2,8); }

// Our score = number of logged goals (falls back to a manually-entered score for older games with none logged)

//// ---------- Quarter clock ----------
function clockElapsedSec(q){

  if(c.running && c.startedAt) ms+=Math.max(0,Date.now()-c.startedAt);
  return Math.min(QLEN*60, Math.floor(ms/1000));
}
function clockRemainingLabel(q){
  const rem=Math.max(0, QLEN*60-clockElapsedSec(q));

}
function toggleClock(qi){
  const g=curGame(); if(!g) return; const q=g.quarters[qi];
  if(!q.clock) q.clock={running:false,startedAt:null,elapsedMs:0};
  if(q.clock.running){
    q.clock.elapsedMs=(q.clock.elapsedMs||0)+Math.max(0,Date.now()-q.clock.startedAt);
    q.clock.running=false; q.clock.startedAt=null;
  } else {
    if(clockElapsedSec(q)>=QLEN*60) return; // finished — nothing to resume, use Reset

}
function resetClock(qi){

}
// Current clock reading in minutes (nearest 0.5), for defaulting sub-minute fields to "right now."
// Returns null if the clock hasn't been started yet, so callers can fall back to a sensible default.
function clockMinuteNow(qi){
  const g=curGame(); if(!g) return null; const q=g.quarters[qi]; if(!q) return null;
  const sec=clockElapsedSec(q); if(sec<=0) return null;

//// ---------- Sub-timing alert ----------
// Two triggers, checked every tick while a quarter's clock is running:
//  1) named player: any on-field outfield player who's hit `subAlertThreshold` consecutive
//     minutes (reuses the same consecutiveOutfieldMinutes signal Suggest Subs already relies on).
//  2) periodic checkpoint: every 5 game-minutes, a generic nudge if nobody's individually over
//     threshold yet — so you still get a prompt on quarters with lots of rotation already happening.
// Alerts are keyed so dismissing one doesn't suppress the *next* time the same player crosses
// another full threshold multiple, and keys are namespaced by game id so switching games can't
// leak a stale dismissal into a new one.
function computeSubAlert(){
  const g=curGame(); if(!g) return null;
  const qi=ui.qi; const q=g.quarters[qi]; if(!q || !q.clock || !q.clock.running) return null;
  const sec=clockElapsedSec(q); if(sec<=0) return null;
  const minute=sec/60;
  const threshold=Number(state.settings.subAlertThreshold)||6;
  ui.dismissedAlerts=ui.dismissedAlerts||{};
  const slots=FORMATIONS[q.formation].slots.filter(s=>s.grp!=="GK");
  let best=null;
  slots.forEach(s=>{
    const pid=slotOccupantAt(q,s.id,minute); if(!pid) return;
    const mins=consecutiveOutfieldMinutes(pid,qi,minute);
    if(mins>=threshold){
      const cycle=Math.floor(mins/threshold);
      const key="p:"+g.id+":"+qi+":"+pid+":"+cycle;
      if(!ui.dismissedAlerts[key] && (!best || mins>best.mins)){
        best={type:"player",key,msg:esc(name(pid))+" has been on <b>"+fmt(mins)+" min</b> straight — consider a sub."};
      }
    }
  });
  if(best) return best;
  const CP=5;
  const cpIdx=Math.floor(minute/CP);
  if(cpIdx>=1){
    const key="cp:"+g.id+":"+qi+":"+cpIdx;
    if(!ui.dismissedAlerts[key]){
      return {type:"checkpoint",key,msg:fmt(cpIdx*CP)+" min gone in Q"+(qi+1)+" — worth a quick playing-time check."};
    }
  }
  return null;
}
function dismissSubAlert(){
  ui.dismissedAlerts=ui.dismissedAlerts||{};
  if(ui.activeSubAlert) ui.dismissedAlerts[ui.activeSubAlert.key]=true;
  ui.activeSubAlert=null; ui._lastAlertKey=undefined;
  render();
}
// Lightweight tick — updates only the visible clock text directly rather than a full render(),
// so a running clock doesn't interrupt whatever the coach is doing (typing, an open sheet, etc).
// A full render() only fires when the sub-alert banner actually needs to appear/disappear/change,
// not on every 500ms tick, for the same reason.
setInterval(()=>{
  try{
    if(!state || !ui || ui.view!=="game") return;
    const g=curGame(); if(!g) return;
    const q=g.quarters[ui.qi]; if(!q || !q.clock) return;
    const el=document.getElementById("clockDisplay");
    if(el) el.textContent=clockRemainingLabel(q);
    if(q.clock.running && clockElapsedSec(q)>=QLEN*60){
      q.clock.elapsedMs=QLEN*60*1000; q.clock.running=false; q.clock.startedAt=null;
      save(); render(); return;
    }
    const alert=computeSubAlert();
    const key=alert?alert.key:null;
    if(key!==ui._lastAlertKey){
      ui._lastAlertKey=key; ui.activeSubAlert=alert;
      // Best-effort buzz when a NEW alert appears (not on dismiss/clear). No-op on browsers that
      // don't support it (notably iOS Safari) — the visible banner is the alert either way.
      if(alert && navigator.vibrate){ try{ navigator.vibrate(200); }catch(e){} }
      render();
    }
  }catch(e){}
}, 500);

//// ---------- Minutes engine ----------
// Per quarter: walk each slot's timeline from lineup[slot] (minute 0) through subs (sorted), to QLEN.
function quarterStints(q){
  const slots = FORMATIONS[q.formation].slots;
  // 1) raw intervals per slot
  const raw=[];
  slots.forEach(s=>{
    const evs = (q.subs||[]).filter(x=>x.slot===s.id).slice().sort((a,b)=>a.minute-b.minute);
    let cur = q.lineup[s.id]||null, t=0;
    evs.forEach(ev=>{
      let m=Math.max(0,Math.min(QLEN,ev.minute));
      if(cur && m>t) raw.push({pid:cur,slot:s.id,grp:s.grp,start:t,end:m});
      cur=ev.on; t=m;
    });
    if(cur && QLEN>t) raw.push({pid:cur,slot:s.id,grp:s.grp,start:t,end:QLEN});
  });
  // 2) a player can't be in two places at once — clip overlapping intervals so each
  //    instant is counted once (earliest-starting slot wins the time). This caps any
  //    player at 12.5/quarter even if they were subbed into a spot while already on.
  const byP={};
  raw.forEach(r=>{ (byP[r.pid]=byP[r.pid]||[]).push(r); });
  const out=[];
  Object.keys(byP).forEach(pid=>{
    const ivs=byP[pid].slice().sort((a,b)=> a.start-b.start || a.end-b.end);
    let coveredEnd=0;
    ivs.forEach(iv=>{
      const s=Math.max(iv.start, coveredEnd);
      if(iv.end>s){ out.push({pid:pid,slot:iv.slot,grp:iv.grp,min:iv.end-s}); coveredEnd=iv.end; }
    });
  });
  return out.filter(x=>x.min>0);
}
// Who occupies a given slot at a given minute (null if vacated/empty)
function slotOccupantAt(q,slotId,minute){
  const evs=(q.subs||[]).filter(x=>x.slot===slotId).slice().sort((a,b)=>a.minute-b.minute);
  let occ=q.lineup[slotId]||null;
  evs.forEach(ev=>{ if(ev.minute<=minute) occ=ev.on; });
  return occ;
}
// Which slot a player currently occupies at a given minute (or null if benched)
function occupantSlotOf(q,pid,minute){
  const slots=FORMATIONS[q.formation].slots;
  for(const s of slots){
    const evs=(q.subs||[]).filter(x=>x.slot===s.id).slice().sort((a,b)=>a.minute-b.minute);
    let occ=q.lineup[s.id]||null;
    evs.forEach(ev=>{ if(ev.minute<=minute) occ=ev.on; });
    if(occ===pid) return s.id;
  }
  return null;
}
function gameMinutes(g){
  const m={}; // pid -> {total, grp:{}, q:[0,0,0,0]}
  g.quarters.forEach((q,qi)=>{
    quarterStints(q).forEach(st=>{
      if(!m[st.pid]) m[st.pid]={total:0,grp:{GK:0,D:0,M:0,F:0},q:[0,0,0,0]};
      m[st.pid].total+=st.min; m[st.pid].grp[st.grp]+=st.min; m[st.pid].q[qi]+=st.min;
    });
  });
  return m;
}
function playerInQuarterMinutes(g,qi,pid){
  let s=0; quarterStints(g.quarters[qi]).forEach(st=>{ if(st.pid===pid) s+=st.min; }); return s;
}
//// ---------- Playing-time targets ----------
// Fair share = all field-minutes (however many are on the field at once × full game) split across
// everyone present, capped at a full game. Field size follows the formation actually in play
// (8/7/6), not a hardcoded 8, so smaller-squad games still produce a sane target.
// Present players still available to be selected for lineups/subs — everyone checked in EXCEPT
// anyone marked Injured/Out. `g.present` itself always keeps out-players in it (never remove them
// there) so their already-logged minutes keep showing in the minutes table, summaries, and season
// stats. Use this helper anywhere you're building a pool of who CAN still be picked to play.
function activePresent(g){ const out=g.out||[]; return (g.present||[]).filter(p=>!out.includes(p)); }
function fairShare(g){ const N=activePresent(g).length; if(!N) return 0; const fieldSize=Math.min(N,8); return Math.min(QLEN*4, fieldSize*QLEN*4 / N); }
function targetFor(g){ const t=(g.targetMin!=null && g.targetMin!=="")? parseFloat(g.targetMin):NaN; return isNaN(t)? fairShare(g): t; }
function ptStatus(total,target){ const tol=6; if(total<target-tol) return {k:"short",lbl:"▼ short"}; if(total>target+tol) return {k:"over",lbl:"▲ over"}; return {k:"on",lbl:"✓ on"}; }
// Same ±6 tolerance as ptStatus, but returns the actual minute difference for the minutes-tracker
// card (e.g. "-6" / "+4") instead of a generic label.
function ptDiff(total,target){
  const tol=6, diff=total-target;
  if(Math.abs(diff)<=tol) return {k:"on", txt:"On"};
  const r=Math.round(diff);

}
// Which position group a player spent the most minutes in this game — drives the color accent
// on the minutes-tracker card (falls back to Def if they haven't played yet).
function dominantGroup(gp){
  let best="D", bv=-1;
  GRP_ORDER.forEach(k=>{ const v=(gp&&gp[k])||0; if(v>bv){ bv=v; best=k; } });
  return bv>0?best:"D";
}
// Builds the colored segments for a minutes-tracker bar — one per position group actually played,
// sized proportionally against scaleMax, left to right in GK/Def/Mid/Fwd order. This is what makes
// the bar show a real breakdown of where a player's minutes came from instead of one flat color.
function mtSegments(grpMinutes, scaleMax){
  let left=0, html="";
  GRP_ORDER.forEach(k=>{
    const min=(grpMinutes&&grpMinutes[k])||0;
    if(min<=0) return;
    const w=Math.max(0, min/scaleMax*100);
    html+=`<div class="mt-seg" style="left:${left}%;width:${w}%;background:var(--${k.toLowerCase()})"></div>`;
    left+=w;
  });

}
function setTarget(v){ const g=curGame(); g.targetMin=(v===""||v==null)?null:v; save(); render(); }
//// ---------- Suggest next quarter ----------
function suggestionFor(qi){ const g=curGame(); const present=activePresent(g);
  if(qi===0) return present.slice(); // Q1: by arrival order
  const prior={}; present.forEach(p=>prior[p]=0);
  for(let i=0;i<qi;i++){ quarterStints(g.quarters[i]).forEach(st=>{ if(prior[st.pid]!=null) prior[st.pid]+=st.min; }); }
  return present.slice().sort((a,b)=>(prior[a]-prior[b])||(present.indexOf(a)-present.indexOf(b)));
}
function applySuggestion(qi){ if(qi===0) autoFill(qi); else suggestBalance(qi); }
//// ---------- Keepers (set first) ----------
function setKeeper(half,v){ const g=curGame(); g.keepers=g.keepers||{h1:null,h2:null}; g.keepers[half]=v||null; save(); render(); }
function keeperOptions(g,half){ const sel=(g.keepers&&g.keepers[half])||"";
  let o=`<option value="">— auto —</option>`;
  activePresent(g).forEach(pid=>{ o+=`<option value="${pid}" ${sel===pid?"selected":""}>${esc(name(pid))}${isGK(pid)?" 🧤":""}</option>`; });
  return o; }
// The keeper for a given quarter: explicit half-keeper → Keep-GK continuity → keeper pool → none.
function keeperForQuarter(qi){ const g=curGame(); const k=g.keepers||{};

//// ---------- Whole-game auto-rotation ----------
function autoRotateGame(){
  const g=curGame(); const present=activePresent(g); const N=present.length;
  if(!N){ alert("Check players in first."); return; }
  const fit=bestFormationFor(N);
  if(N<6){ if(!confirm("Only "+N+" present (need at least 6 for a full side). Plan all 4 quarters anyway with some open spots?")) return; }
  else if(!confirm("Auto-plan all 4 quarters ("+FORMATIONS[fit].label+") for even minutes? This replaces lineups you've set.")) return;
  // 1) Decide the keeper for each quarter (explicit half-keepers first, then pool, then anyone).
  const poolPres=gkPoolPresent(); const kfb=poolPres.length?poolPres:present; const k=g.keepers||{};
  let kH1=(k.h1&&present.includes(k.h1))?k.h1:(g.keepGK!==false?(kfb[0]||null):null);
  let kH2=(k.h2&&present.includes(k.h2))?k.h2:(g.keepGK!==false?(kfb.find(p=>p!==kH1)||kfb[0]||null):null);
  const keeperByQ=[0,1,2,3].map(q=>{
    const ex=keeperForQuarter(q); if(ex) return ex;
    if(g.keepGK!==false) return q<2?kH1:kH2;
    return poolPres.length? poolPres[q%poolPres.length] : null; // keepGK off: rotate pool, else open
  });

  const running={}; present.forEach(p=>running[p]=0);
  for(let q=0;q<4;q++){
    const keeper=keeperByQ[q];
    const fm=fit;
    const slots=FORMATIONS[fm].slots;
    const lineup={}; let fillSlots, cand;
    if(keeper){ lineup["gk"]=keeper; running[keeper]+=QLEN; fillSlots=slots.filter(s=>s.id!=="gk"); cand=present.filter(p=>p!==keeper); }
    else { fillSlots=slots.slice(); cand=present.slice(); }
    // who plays outfield: lowest running first; Q-tie breaks to earlier arrivals
    const order=cand.sort((a,b)=> (running[a]-running[b]) || (present.indexOf(a)-present.indexOf(b)) );
    let playOut=order.slice(0,fillSlots.length);
    let rot=playOut.slice(); if(rot.length){ const off=(q*3)%rot.length; rot=rot.slice(off).concat(rot.slice(0,off)); } // vary positions
    rot.forEach((pid,i)=>{ lineup[fillSlots[i].id]=pid; });
    playOut.forEach(p=>{ running[p]+=QLEN; });
    g.quarters[q]={formation:fm, lineup, subs:[], clock:{running:false,startedAt:null,elapsedMs:0}};
  }
  rebalanceAuto(g,present,keeperByQ);   // even out totals (spread to one quarter)
  protectKeepers(g,present,keeperByQ);  // and make sure keepers aren't the ones stuck playing a full game
  ui.qi=0; save(); render();
}
// Every keeper's outfield slots across the game's non-keeper quarters.
function keeperOutfieldSlots(g,kp,keeperByQ){
  const out=[];
  for(let qi=0;qi<4;qi++){
    if(keeperByQ[qi]===kp) continue; // this is a quarter they're in goal, not outfield
    const slots=FORMATIONS[g.quarters[qi].formation].slots;
    slots.forEach(s=>{ if(s.id!=="gk" && g.quarters[qi].lineup[s.id]===kp) out.push({qi,slot:s.id}); });
  }
  return out;
}
// Keepers should always get some real field time — playing a full half in goal shouldn't mean
// zero outfield minutes for the game. This: (1) guarantees at least one outfield slot for any
// keeper who currently has none, by bumping whoever has the highest total in a non-keeper
// quarter; then (2) rebalances a keeper's EXTRA outfield time toward rested bench players (same
// as before), but never touches their last remaining slot — that floor is protected.
function protectKeepers(g,present,keeperByQ){
  const keepers=[...new Set(keeperByQ.filter(Boolean))];
  keepers.forEach(kp=>{
    if(keeperOutfieldSlots(g,kp,keeperByQ).length) return; // already has at least one — nothing to guarantee
    const t=autoTotals(g,present);
    let bestQ=-1, bestSlot=null, bestOccTotal=-1;
    for(let qi=0;qi<4;qi++){
      if(keeperByQ[qi]===kp) continue;
      FORMATIONS[g.quarters[qi].formation].slots.forEach(s=>{
        if(s.id==="gk") return;
        const occ=g.quarters[qi].lineup[s.id];
        if(!occ || occ===keeperByQ[qi]) return;
        if((t[occ]||0)>bestOccTotal){ bestOccTotal=t[occ]||0; bestQ=qi; bestSlot=s.id; }
      });
    }
    if(bestQ>=0) g.quarters[bestQ].lineup[bestSlot]=kp; // give the keeper the busiest player's spot
  });
  for(let iter=0;iter<300;iter++){
    const t=autoTotals(g,present); let moved=false;
    for(const kp of keepers){
      if(keeperOutfieldSlots(g,kp,keeperByQ).length<=1) continue; // never take away their last outfield slot
      for(let q=0;q<4 && !moved;q++){
        if(keeperByQ[q]===kp) continue;                 // this is a quarter the keeper is in goal — leave it
        const slots=FORMATIONS[g.quarters[q].formation].slots;
        let kpSlot=null; slots.forEach(s=>{ if(s.id!=="gk" && g.quarters[q].lineup[s.id]===kp) kpSlot=s.id; });
        if(!kpSlot) continue;                            // keeper isn't playing outfield this quarter
        const onQ=new Set(slots.map(s=>g.quarters[q].lineup[s.id]).filter(Boolean));
        let cand=null; present.forEach(p=>{ if(!onQ.has(p) && p!==keeperByQ[q] && t[p] < t[kp]-0.1 && (!cand || t[p]<t[cand])) cand=p; });
        if(cand){ g.quarters[q].lineup[kpSlot]=cand; moved=true; }  // keeper rests, rested player comes on
      }
      if(moved) break;
    }
    if(!moved) break;
  }
}
// Total minutes per player in an auto-plan (no subs) = 12 per slot occupied, including goal.
function autoTotals(g,present){ const t={}; present.forEach(p=>t[p]=0);
  g.quarters.forEach(q=>{ FORMATIONS[q.formation].slots.forEach(s=>{ const pid=q.lineup[s.id]; if(pid&&t[pid]!=null) t[pid]+=QLEN; }); }); return t; }
// Local-search: repeatedly move the highest-total player out of an outfield slot for the lowest-total benched player.
function rebalanceAuto(g,present,keeperByQ){
  for(let iter=0;iter<400;iter++){
    const t=autoTotals(g,present);
    let hi=present[0], lo=present[0];
    present.forEach(p=>{ if(t[p]>t[hi])hi=p; if(t[p]<t[lo])lo=p; });
    if(t[hi]-t[lo] <= QLEN) break; // already within one quarter — optimal
    let done=false;
    for(let q=0;q<4 && !done;q++){
      if(hi===keeperByQ[q] || lo===keeperByQ[q]) continue;      // don't touch a quarter's keeper
      const slots=FORMATIONS[g.quarters[q].formation].slots;
      if(slots.some(s=>g.quarters[q].lineup[s.id]===lo)) continue; // lo must be on the bench this quarter
      let hiSlot=null; slots.forEach(s=>{ if(s.id!=="gk" && g.quarters[q].lineup[s.id]===hi) hiSlot=s.id; });
      if(hiSlot){ g.quarters[q].lineup[hiSlot]=lo; done=true; }   // swap: hi rests, lo plays
    }
    if(!done) break; // no beneficial swap available
  }
}

//// ---------- Navigation / render ----------
function render(){
  document.querySelectorAll(".dragbubble").forEach(g=>g.remove()); // clear any stray drag bubble
  document.querySelectorAll("nav.tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.nav===ui.view && !ui.gameId));
  const app=document.getElementById("app");
  if(ui.gameId && ui.view==="game"){ app.innerHTML=renderGame(); afterGameRender(); }
  else if(ui.view==="games") app.innerHTML=renderGames();
  else if(ui.view==="season") app.innerHTML=renderSeason();
  else if(ui.view==="roster") app.innerHTML=renderRoster();
  else if(ui.view==="backup") app.innerHTML=renderBackup();
  document.getElementById("hdr-title").textContent=state.settings.teamName||"My Team";
  document.getElementById("hdr-sub").textContent="8v8 · 4 × 12 min";
}
function go(v){ ui.view=v; ui.gameId=null; render(); window.scrollTo(0,0); }
function openGame(id){ ui.gameId=id; ui.view="game"; ui.qi=0; ui.activeSubAlert=null; ui._lastAlertKey=undefined; render(); window.scrollTo(0,0); }

//// ---------- Games list ----------
function renderSetup(){
  let h=`<div class="card"><h2 style="margin:0 0 5px;font-size:19px">👋 Welcome</h2>
    <div class="muted" style="font-size:14px">Set up your team to get started. Everything saves on this device — no account, works offline once added to your home screen.</div></div>`;
  h+=`<div class="card">
    <label class="fld" style="margin-top:0">Team name</label>
    <input id="setupTeam" placeholder="e.g. Strikers FC" value="${esc(state.settings.teamName||"")}">
    <label class="fld">Default formation</label><select id="setupFormation">`;
  formationsOfSize(8).forEach(f=>h+=`<option ${state.settings.defaultFormation===f?'selected':''}>${f}</option>`);
  h+=`</select>
    <label class="fld">Players — one name per line</label>
    <textarea id="setupNames" placeholder="Ava&#10;Mia&#10;Sofia&#10;…" style="width:100%;min-height:150px;font-size:16px;padding:10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;resize:vertical"></textarea>
    <div class="muted" style="font-size:12.5px;margin:6px 0 10px">You can add jersey numbers and tag keepers later on the Roster tab.</div>
    <button class="btn wide" onclick="createTeam()">Create team</button></div>`;
  return h;
}
function createTeam(){
  const tn=(document.getElementById("setupTeam").value||"").trim();
  const fm=document.getElementById("setupFormation").value;
  const names=(document.getElementById("setupNames").value||"").split(/\n+/).map(s=>s.trim()).filter(Boolean);
  if(!names.length){ alert("Add at least one player (one name per line)."); return; }
  state.settings.teamName=tn||"My Team";
  state.settings.defaultFormation=fm;
  state.roster=names.map(n=>({id:uid("p"),name:n,gk:false,number:"",notes:""}));
  save(); ui.view="games"; render();
}
function renderGames(){
  if(!state.roster.length) return renderSetup();
  let h=`<div class="row between" style="margin:4px 2px 2px"><h2 style="margin:0;font-size:18px">Games</h2>
    <button class="btn sm" onclick="newGame()">＋ New game</button></div>`;
  if(!state.games.length){ h+=`<div class="empty">No games yet.<br>Tap <b>New game</b> to set up your first lineup.</div>`; return h; }
  const sorted=state.games.slice().sort((a,b)=> (b.date||"").localeCompare(a.date||"") || b.id.localeCompare(a.id));
  sorted.forEach(g=>{
    const present=(g.present||[]).length;
    const mm=gameMinutes(g); const played=Object.keys(mm).length;
    let score="";
    if((g.goals&&g.goals.length) || (g.them!==""&&g.them!=null)) score=`<span class="pill">${ourScore(g)} – ${(g.them!==""&&g.them!=null)?g.them:0}</span>`;
    h+=`<div class="card" onclick="openGame('${g.id}')">
      <div class="row between"><h2>${g.opp? "vs "+esc(g.opp):"Untitled game"}</h2>${score}</div>
      <div class="muted" style="font-size:13px;margin-top:2px">${g.date||"No date"} · ${present} present · ${played} have minutes set</div>
    </div>`;
  });
  return h;
}
function newGame(){
  const today=new Date().toISOString().slice(0,10);
  const g={id:uid("g"),date:today,opp:"",us:"",them:"",present:[],out:[],keepGK:true,keepers:{h1:null,h2:null},goals:[],
    phase:"setup",
    quarters:[0,1,2,3].map(()=>blankQuarter(state.settings.defaultFormation))};
  state.games.push(g); save(); openGame(g.id);
}
function deleteGame(id){ if(!confirm("Delete this game and its data?"))return; state.games=state.games.filter(g=>g.id!==id); save(); go("games"); }

//// ---------- Game view ----------
function renderGame(){
  const g=curGame(); if(!g){ go("games"); return ""; }
  if(!g.phase) g.phase="setup";
  let h=`<div class="row between" style="margin:2px"><button class="btn ghost sm" onclick="go('games')">‹ Games</button>
    <button class="btn red sm" onclick="deleteGame('${g.id}')">Delete</button></div>`;
  h+=`<div class="row between" style="margin:8px 2px 4px;align-items:baseline"><h2 style="margin:0;font-size:17px">${g.opp?"vs "+esc(g.opp):"Untitled game"}</h2>
    <span class="muted" style="font-size:12.5px">${g.date?fmtDateLong(g.date):"No date"}</span></div>`;
  h+=`<div class="qtabs">
    <button class="${g.phase==='setup'?'active':''}" onclick="setPhase('setup')">① Pre-game</button>
    <button class="${g.phase==='live'?'active':''}" onclick="setPhase('live')">② Live</button>
    <button class="${g.phase==='finish'?'active':''}" onclick="setPhase('finish')">③ Finished</button>
  </div>`;
  if(g.phase==="live") h+=renderGameLive(g);
  else if(g.phase==="finish") h+=renderGameFinish(g);
  else h+=renderGameSetup(g);
  return h;
}
function setPhase(p){ const g=curGame(); if(!g) return; g.phase=p; save(); render(); window.scrollTo(0,0); }

//// ---------- Pre-game ----------
function renderGameSetup(g){
  const present=g.present||[];
  const activeP=activePresent(g);
  let h=`<div class="card">
    <label class="fld" style="margin-top:0">Opponent</label><input value="${esc(g.opp||"")}" onchange="setGame('opp',this.value)" placeholder="e.g. Riverside United">
    <label class="fld">Date</label><input type="date" value="${g.date||""}" onchange="setGame('date',this.value)">
  </div>`;

  // attendance
  h+=`<h2 class="sec">Check-in · tap in arrival order</h2><div class="card">`;
  const mmAtt=gameMinutes(g);
  if(activeP.length){
    h+=`<div class="muted" style="font-size:12.5px;margin-bottom:4px">On the field, first arrivals start. Order shown at left.</div>`;
    activeP.forEach((pid,i)=>{
      const played=((mmAtt[pid]||{}).total||0)>0;
      h+=`<div class="pl"><div class="ord">${i+1}</div><div class="nm">${esc(name(pid))}${isGK(pid)?'<span class="gkbadge">🧤 GK</span>':''}</div>
        <button class="btn ghost sm" onclick="toggleAttend('${pid}')">${played?"Injured/Out":"Out"}</button></div>`;
    });
  } else h+=`<div class="muted" style="font-size:14px">No one checked in yet. Tap players below as they arrive.</div>`;
  if((g.out||[]).length){
    h+=`<div class="ltlabel" style="margin-top:10px">Injured / out for today (${g.out.length})</div>`;
    h+=`<div class="muted" style="font-size:11.5px;margin:2px 0 4px">Minutes they already played still count — they're just out of the pool for future quarters.</div>`;
    g.out.forEach(pid=>{
      const mins=(mmAtt[pid]||{}).total||0;
      h+=`<div class="pl absent"><div class="ord off">🚑</div><div class="nm">${esc(name(pid))} <span class="muted" style="font-size:12px">· ${fmt(mins)} min played</span></div>
        <button class="btn sm" onclick="setPlayerOut('${pid}',false)">Reactivate</button></div>`;
    });
  }
  const absent=state.roster.filter(p=>!present.includes(p.id));
  if(absent.length){
    h+=`<div style="margin-top:8px">`;
    absent.forEach(p=>{ h+=`<div class="pl absent"><div class="ord off">·</div><div class="nm">${esc(p.name)}${p.gk?'<span class="gkbadge">🧤 GK</span>':''}</div>
      <button class="btn sm" onclick="toggleAttend('${p.id}')">Present</button></div>`; });
    h+=`</div>`;
  }
  h+=`</div>`;
  h+=`<div class="muted" style="font-size:11.5px;margin:2px 4px 10px">Running late? This tab stays open the whole game — come back anytime to check in a latecomer or hand the keeper spot to someone else.</div>`;

  // keepers (set first)
  h+=`<h2 class="sec">Keepers · set first</h2><div class="card">`;
  h+=`<div class="muted" style="font-size:12.5px;margin-bottom:7px">Pick who's in goal each half (24 min each). Auto-plan counts these minutes so keepers get less outfield time — nobody plays the whole game while others only get a half. Leave on <b>auto</b> to let Auto-plan choose from your keeper pool. If your keeper comes off mid-game, change it here or on the Live tab.</div>`;
  h+=`<div class="row" style="gap:10px">
    <div style="flex:1"><label class="fld" style="margin-top:0">1st half · Q1–Q2</label><select onchange="setKeeper('h1',this.value)">${keeperOptions(g,'h1')}</select></div>
    <div style="flex:1"><label class="fld" style="margin-top:0">2nd half · Q3–Q4</label><select onchange="setKeeper('h2',this.value)">${keeperOptions(g,'h2')}</select></div>
  </div></div>`;

  // auto-plan
  h+=`<div class="card"><b style="font-size:14px">Auto-plan all 4 quarters</b>
    <div class="muted" style="font-size:12.5px;margin:3px 0 8px">Builds a full-game lineup plan in one tap — balances minutes, rotates positions, and protects keepers. Best run once everyone's checked in.</div>
    <button class="btn ghost wide" onclick="autoRotateGame()">⚡ Auto-plan all 4Q</button></div>`;

  h+=`<button class="btn wide" style="margin-top:6px" onclick="setPhase('live')">Start game →</button>`;
  return h;
}

//// ---------- Live game ----------
function renderGameLive(g){
  const activeP=activePresent(g);
  const mmAll=gameMinutes(g); // running whole-game minutes, schedule-based off the current lineup+subs plan
  const goals=g.goals||[];
  let h=`<div class="card"><div class="row between" style="align-items:center">
    <div><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Us</div>
    <div style="font-weight:800;font-size:26px;color:var(--green-dark)">${ourScore(g)}</div></div>
    <button class="btn sm" onclick="openGoal()">＋ Goal</button></div>`;
  if(goals.length){
    goals.forEach(gl=>{ h+=`<div class="sub-item"><span style="flex:1">⚽ <b>${gl.scorer?esc(name(gl.scorer)):"Unknown"}</b>${gl.assist?` <span class="muted">— assist ${esc(name(gl.assist))}</span>`:""}</span>
      <button class="btn red sm" onclick="delGoal('${gl.id}')">✕</button></div>`; });
  } else h+=`<div class="muted" style="font-size:13px;margin-top:4px">No goals yet. Tap ＋ Goal each time your team scores.</div>`;
  // opponent's score — just a running count, no per-goal detail needed
  h+=`<div class="row between" style="align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)">
    <div><div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Them</div>
    <div style="font-weight:800;font-size:26px;color:var(--f)">${parseInt(g.them,10)||0}</div></div>
    <div class="row" style="gap:6px"><button class="btn ghost sm" onclick="bumpThem(-1)">−</button>
    <button class="btn sm" onclick="bumpThem(1)">＋</button></div></div>`;
  h+=`</div>`;

  // quarters
  h+=`<div class="row between" style="margin:16px 2px 6px"><h2 class="sec" style="margin:0">Lineups</h2></div>`;
  h+=`<div class="qtabs">`;
  for(let i=0;i<4;i++){ h+=`<button class="${i===ui.qi?'active':''}" onclick="setQ(${i})">Q${i+1}</button>`; }
  h+=`</div>`;

  const q=g.quarters[ui.qi];
  if(!q.clock) q.clock={running:false,startedAt:null,elapsedMs:0};
  const clkSec=clockElapsedSec(q), clkDone=clkSec>=QLEN*60, clkWarn=!clkDone && clkSec>=(QLEN*60-60);
  h+=`<div class="card clockcard${clkDone?' done':(clkWarn?' warn':'')}">
    <div class="row between">
      <div class="clocktime" id="clockDisplay">${clockRemainingLabel(q)}</div>
      <div class="row" style="gap:6px">
        ${clkDone
          ? `<span class="pill" style="background:#fdecea;color:#c62828">Time's up</span>`
          : `<button class="btn sm" onclick="toggleClock(${ui.qi})">${q.clock.running?'⏸ Pause':'▶ Start'}</button>`}
        <button class="btn ghost sm" onclick="resetClock(${ui.qi})">↺ Reset</button>
      </div>
    </div>
    <div class="muted" style="font-size:11.5px;margin-top:4px">Q${ui.qi+1} clock · ${fmt(QLEN)} min. Sub times below default to whatever this shows when you log them.</div>
  </div>`;
  // Note: no dedicated keeper picker here — the GK slot is just another lineup position, so
  // swapping the keeper mid-game works the same way as any other sub (drag, tap, or "+ Sub").
  // sub-timing alert — shows only while this quarter's clock is running and a threshold's been crossed
  if(ui.activeSubAlert){
    const sa=ui.activeSubAlert;
    h+=`<div class="suggest" style="border-color:#f0b429;background:#fff8e6">
      <b>⏱ ${sa.type==="player"?"Sub check":"Checkpoint"}</b> — ${sa.msg}
      <div class="row" style="margin-top:8px;gap:8px">
        <button class="btn sm" onclick="openSuggestSubs(${ui.qi})">✨ Suggest subs</button>
        <button class="btn ghost sm" onclick="dismissSubAlert()">Dismiss</button>
      </div></div>`;
  }
  h+=`<div class="card">`;
  h+=`<div class="row between"><label class="fld" style="margin:0">Formation</label>
    <select style="width:auto" onchange="setFormation(${ui.qi},this.value)">`;
  Object.keys(FORMATIONS).forEach(f=>{ h+=`<option value="${f}" ${q.formation===f?'selected':''}>${FORMATIONS[f].label}</option>`; });
  h+=`</select></div>`;
  if(!activeP.length){ h+=`<div class="note">No one's checked in yet — head to the <b>Pre-game</b> tab to check players in.</div>`; }
  // suggest-next-quarter prompt (shown when this quarter isn't set yet)
  if(activeP.length && Object.values(q.lineup).filter(Boolean).length===0){
    const sug=suggestionFor(ui.qi).slice(0,8).map(p=>esc(firstName(name(p)))).join(", ");
    h+=`<div class="suggest"><b>Q${ui.qi+1} isn't set yet.</b> ${ui.qi===0?"Suggested starters by arrival order:":"Lowest minutes so far — suggested to start:"} ${sug}.
      <div style="margin-top:8px"><button class="btn sm" onclick="applySuggestion(${ui.qi})">${ui.qi===0?"Apply by arrival":"Apply balanced lineup"}</button></div></div>`;
  }
  // field
  const qm={}, qmGrp={};
  quarterStints(q).forEach(st=>{
    qm[st.pid]=(qm[st.pid]||0)+st.min;
    qmGrp[st.pid]=qmGrp[st.pid]||{GK:0,D:0,M:0,F:0};
    qmGrp[st.pid][st.grp]=(qmGrp[st.pid][st.grp]||0)+st.min;
  });
  h+=`<div class="field"><div class="ln"></div><div class="cir"></div><div class="pbox t"></div><div class="pbox b"></div>`;
  FORMATIONS[q.formation].slots.forEach(s=>{
    const startPid=q.lineup[s.id]||null;
    const curPid=slotOccupantAt(q,s.id,QLEN);
    const cls=s.grp.toLowerCase();
    const open=(curPid===null && startPid!==null); // started here, then moved away
    let disc,who="",tag="",badge="";
    if(open){
      disc=jerseySVG(s.grp,"","open");
      who=`<div class="wasname">OPEN · was ${esc(firstName(name(startPid)))}</div>`;
    } else if(startPid){
      disc=jerseySVG(s.grp,jerseyLabel(startPid),"filled");
      who=`<div class="who">${esc(firstName(name(startPid)))}</div>`;
      if(curPid && curPid!==startPid) tag=`<div class="tag">▸ ${esc(firstName(name(curPid)))}</div>`;
    } else if(curPid){
      disc=jerseySVG(s.grp,jerseyLabel(curPid),"filled");
      who=`<div class="who">${esc(firstName(name(curPid)))}</div>`;
    } else {
      disc=jerseySVG(s.grp,"","empty");
    }
    const badgePid=curPid||startPid;
    if(badgePid){ badge=`<div class="minbadge">${fmt(qm[badgePid]||0)}'<small>/${fmt((mmAll[badgePid]||{}).total||0)}'</small></div>`; }
    const dragPid=(startPid && !open)? startPid : "";
    // Tired toggle — a real tap target directly on the jersey (in addition to the chip list
    // below), so a coach can flag a kid the moment they look gassed. pointerdown is stopped from
    // bubbling so the tap doesn't get picked up as a lineup drag/reassign gesture.
    let tiredBtn="";
    if(curPid && s.grp!=="GK"){
      const tired=isTired(curPid);
      tiredBtn=`<button type="button" class="tiredbtn${tired?' active':''}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();toggleTired('${curPid}')" title="${tired?'Tired — tap to clear':'Tap if tired'}">😓</button>`;
    }
    h+=`<div class="slot ${cls}" data-slot="${s.id}" data-drag="slot" data-pid="${dragPid}" style="left:${s.x}%;top:${s.y}%">
      ${disc}${tiredBtn}${badge}<div class="pos">${s.pos}</div>${who}${tag}</div>`;
  });
  h+=`</div>`;
  h+=`<div class="muted" style="font-size:11.5px;margin-top:3px">Drag a bench chip or a player onto a spot to set the lineup · tap a spot to pick · <span style="color:var(--f);font-weight:700">OPEN</span> = vacated by a move, fill it with a sub. Badge on each player = <b>this quarter' / whole-game'</b> scheduled minutes · tap 😓 on a jersey to flag them tired.</div>`;
  // bench
  const onField=Object.values(q.lineup).filter(Boolean);
  const bench=activeP.filter(p=>!onField.includes(p));
  h+=`<div class="ltools">`;
  h+=`<div class="ltlabel">Fill the lineup</div>`;
  h+=`<div class="fillgrid">
    <button class="btn ghost sm" onclick="suggestBalance(${ui.qi})">⚖︎ Balance time</button>
    <button class="btn ghost sm" onclick="autoFill(${ui.qi})">↻ By arrival order</button>
    ${ui.qi>0?`<button class="btn ghost sm" onclick="carryOver(${ui.qi})">⏮ Carry over Q${ui.qi}</button>`:""}
    <button class="btn ghost sm" onclick="rotateAreas(${ui.qi})">🔄 Rotate areas</button>
    <button class="btn ghost sm" onclick="clearQ(${ui.qi})">✕ Clear</button></div>
    <div class="muted" style="font-size:11.5px;margin-top:6px">Rotate areas shifts everyone currently in the lineup between defense, midfield and forward — handy when you've got exactly enough players and no one to sub in. Works great paired with Carry over.</div>`;
  if(ui.qi>0){
    h+=`<label class="row" style="gap:8px;margin-top:10px;font-size:13px;font-weight:600"><input type="checkbox" ${g.keepGK!==false?'checked':''} onchange="setKeepGK(this.checked)" style="width:auto"> Keep last quarter's keeper in goal</label>`;
    h+=`<div class="muted" style="font-size:11.5px;margin-top:7px">Plan this quarter anytime · <b>Carry over Q${ui.qi}</b> starts it from Q${ui.qi}'s final players (after subs).</div>`;
  }
  h+=`<div class="ltlabel" style="margin-top:12px">Bench (${bench.length})</div>`;
  h+=`<div class="bench" data-dropbench="1" style="margin-top:5px">`;
  if(bench.length) bench.forEach(p=>{ h+=`<span class="chip" data-drag="bench" data-pid="${p}">${esc(firstName(name(p)))} <span class="chipmin">${fmt(qm[p]||0)}'/${fmt((mmAll[p]||{}).total||0)}'</span></span>`; });
  else h+=`<span class="muted" style="font-size:13px">Everyone present is on the field. Drag a player here to bench them.</span>`;
  h+=`</div>`;
  h+=`</div>`;
  // unassigned warning
  const emptySlots=FORMATIONS[q.formation].slots.filter(s=>!q.lineup[s.id]).length;
  if(activeP.length && emptySlots>0) h+=`<div class="bench"><span class="chip warn">${emptySlots} open position${emptySlots>1?"s":""}</span></div>`;

  // Q2 / Q4 mid-half rotation prompt (parity + rest)
  if((ui.qi===1||ui.qi===3) && bench.length && Object.values(q.lineup).filter(Boolean).length){
    h+=`<div class="suggest"><b>${ui.qi===1?"First":"Second"}-half rotation point.</b> Halfway through Q${ui.qi+1} is a good time to even out minutes and rest tired legs.
      <div style="margin-top:8px"><button class="btn sm" onclick="openSuggestSubs(${ui.qi})">✨ Suggest subs</button></div></div>`;
  }
  // subs
  h+=`<div class="row between" style="margin-top:14px"><b style="font-size:13px">Mid-quarter subs</b>
    <div class="toolbtns"><button class="btn ghost sm" onclick="openSuggestSubs(${ui.qi})">✨ Suggest</button>
    <button class="btn ghost sm" onclick="openMassSub(${ui.qi})">⇄ Sub bench</button>
    <button class="btn sm" onclick="openSub(${ui.qi})">＋ Sub</button></div></div>`;
  const subs=(q.subs||[]).slice().sort((a,b)=>a.minute-b.minute);
  if(subs.length){
    subs.forEach(sb=>{ const slot=FORMATIONS[q.formation].slots.find(x=>x.id===sb.slot);
      h+=`<div class="sub-item"><span class="t">${fmt(sb.minute)}'</span>
        <span style="flex:1">${slot?slot.pos:"?"}: <b>${esc(firstName(name(sb.on)))}</b> comes on</span>
        <button class="btn red sm" onclick="delSub(${ui.qi},'${sb.id}')">✕</button></div>`; });
  } else h+=`<div class="muted" style="font-size:13px;margin-top:4px">No subs — everyone on the field plays the full ${fmt(QLEN)} min this quarter.</div>`;

function renderGameMinutes(g){

      h+=`<tr><td class="name">${esc(name(pid))}</td>
        <td>${gp.GK?fmt(gp.GK):"·"}</td><td>${gp.D?fmt(gp.D):"·"}</td>
        <td>${gp.M?fmt(gp.M):"·"}</td><td>${gp.F?fmt(gp.F):"·"}</td></tr>`; });
    h+=`</tbody></table></div>`;
  }
  h+=`<div class="card"><b style="font-size:14px">Send postgame summary</b>
    <div class="muted" style="font-size:13px;margin:3px 0 8px">Emails the minutes, score, and your notes. Edit recipients in your mail app.</div>

function fmtDateLong(d){
  if(!d) return "";
  try{ const dt=new Date(d+"T00:00:00"); if(isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"});
  }catch(e){ return d; }
}
// Plain-text summary, formatted to read cleanly in any mail client. Mailto bodies are always
// plain text — no bold/colors/tables — so this leans on short lines, "·" separators, and simple
// divider rules instead of padded columns (which only line up in a monospace font and look
// broken in the proportional fonts most mail apps compose with).
function gameSummaryText(g){
  const mm=gameMinutes(g); const present=g.present||[]; const target=targetFor(g);
  const DIV="––––––––––––––––––––";
  const L=[];
  L.push("⚽ "+(state.settings.teamName||"Team")+(g.opp?(" vs "+g.opp):""));
  const sub=[];
  if(g.date) sub.push(fmtDateLong(g.date));
  if((g.goals&&g.goals.length)||(g.them!==""&&g.them!=null)){
    const us=ourScore(g), them=(g.them!==""&&g.them!=null)?+g.them:0;
    const r=(us>them)?"W":((us<them)?"L":"T");
    sub.push("Final "+us+"–"+them+" ("+r+")");
  }
  sub.push("Target "+fmt(target)+" min/player");
  L.push(sub.join("  ·  "));
  L.push("");
  L.push(DIV); L.push("⏱ PLAYING TIME  (max "+fmt(QLEN*4)+" min)"); L.push(DIV);
  const list=present.map(pid=>({pid,m:mm[pid]||{total:0,q:[0,0,0,0],grp:{GK:0,D:0,M:0,F:0}}})).sort((a,b)=>b.m.total-a.m.total);
  list.forEach(r=>{ const qs=r.m.q.map(x=>fmt(x)||"0").join("/"); const st=ptStatus(r.m.total,target);
    L.push(name(r.pid)+" — "+fmt(r.m.total)+" min  ·  "+st.lbl+"  ·  Q "+qs); });
  const short=list.filter(r=>ptStatus(r.m.total,target).k==="short").map(r=>name(r.pid));
  if(short.length){ L.push(""); L.push("Below target: "+short.join(", ")); }
  if((g.goals||[]).length){
    L.push(""); L.push(DIV); L.push("⚽ GOALS ("+g.goals.length+")"); L.push(DIV);
    g.goals.forEach(gl=>{ L.push((gl.scorer?name(gl.scorer):"Unknown")+(gl.assist?("  (assist "+name(gl.assist)+")"):"")); });
  }
  L.push(""); L.push(DIV); L.push("📍 POSITION MINUTES  (GK / Def / Mid / Fwd)"); L.push(DIV);
  list.forEach(r=>{ const gp=r.m.grp; L.push(name(r.pid)+" — "+fmt(gp.GK||0)+" / "+fmt(gp.D||0)+" / "+fmt(gp.M||0)+" / "+fmt(gp.F||0)); });
  if(g.notes){ L.push(""); L.push(DIV); L.push("📝 NOTES"); L.push(DIV); L.push(g.notes); }
  return L.join("\n");
}

// Rich-text version for pasting into an email draft (mailto links can never carry HTML — every
// mail app treats the body as plain text — so this copies real HTML to the clipboard instead,
// which Gmail/Apple Mail/Outlook compose windows render with formatting intact when pasted).
// The "Playing Time" block below is written with fully inline styles (no CSS classes/vars) so it
// still renders correctly once pasted, but it deliberately mirrors the in-app minutes-tracker card
// (mt-row/mt-badge/mt-bar in the <style> block above + renderGameMinutes()) — jersey badge, name,
// minutes colored by dominant position group, a status pill, a segmented time-by-line bar, and the
// per-quarter breakdown underneath — so the emailed summary looks like the app, not a plain table.
// The in-app bar uses position:absolute segments (fine on a real page), but rich-text paste targets
// (Gmail compose, Apple Mail, Notes, Docs) strip position/top/left from pasted HTML, which made the
// bar disappear entirely. This builds the same left-to-right breakdown — plus the target tick — as
// a single row of <td> cells instead, which survives clipboard sanitizing because only width/
// background survive, and those are enough.
function mtBarCellsEmail(grpMinutes, scaleMax, tickPct){
  let segs=[], left=0;
  GRP_ORDER.forEach(k=>{
    const min=(grpMinutes&&grpMinutes[k])||0;
    if(min<=0) return;
    const w=Math.max(0, min/scaleMax*100);
    segs.push({start:left, end:left+w, color:GRP_COLOR[k]});
    left+=w;
  });
  if(left<99.7) segs.push({start:left, end:100, color:"#eef1f8"});
  if(!segs.length) segs=[{start:0,end:100,color:"#eef1f8"}];
  let cells=[];
  if(tickPct!=null && tickPct>0.3 && tickPct<99.7){
    segs.forEach(s=>{
      if(tickPct>s.start && tickPct<s.end){
        cells.push({pct:tickPct-s.start, color:s.color});
        cells.push({tick:true, color:"#1a2238"});
        cells.push({pct:s.end-tickPct, color:s.color});
      } else cells.push({pct:s.end-s.start, color:s.color});
    });
  } else segs.forEach(s=>cells.push({pct:s.end-s.start, color:s.color}));
  return `<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;border-collapse:collapse"><tr>`+
    cells.map(c=>c.tick
      ? `<td width="2" style="width:2px;height:8px;line-height:8px;font-size:0;background:${c.color};opacity:.5">&nbsp;</td>`
      : `<td style="width:${c.pct}%;height:8px;line-height:8px;font-size:0;background:${c.color}">&nbsp;</td>`).join("")+
    `</tr></table>`;
}

function copySummaryHTML(id){
