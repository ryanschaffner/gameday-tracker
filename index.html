<style>
  :root{
    --bg:#0B0F14; --card:#161C24; --card2:#141A20; --track:#1B2530; --avatar:#1E2732;
    --line: rgba(255,255,255,.07); --line2: rgba(255,255,255,.05); --line3: rgba(255,255,255,.1);
    --ink:#F2F6FB; --ink2:#E4EAF1; --muted:#8A97A6; --muted2:#7E8B99; --dim:#5A6675; --dim2:#657181;
    --blue:#2E8BFF; --blue-light:#57A6FF; --blue-lighter:#8CC2FF;
    --blue-bg: rgba(46,139,255,.15); --blue-border: rgba(46,139,255,.35);
    --green:#34D07F; --green-bg: rgba(52,208,127,.14); --green-border: rgba(52,208,127,.3);
    --amber:#FFB020; --amber-bg: rgba(255,176,32,.14); --amber-border: rgba(255,176,32,.28);
    --red:#FF7B7E; --red-bg: rgba(255,90,79,.14); --red-border: rgba(255,90,79,.3);
    --gk:#2E8BFF; --d:#34D07F; --m:#FFB020; --f:#FF7B7E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{overflow-x:hidden;width:100%;max-width:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;
    font-family:'Barlow',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;padding-bottom:96px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:620px;margin:0 auto;padding:16px 14px 14px;}
  @keyframes gdblink{0%,100%{opacity:1}50%{opacity:.25}}

  /* bottom nav */
  nav.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(11,15,20,.94);backdrop-filter:saturate(1.2) blur(8px);
    border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);}
  nav.tabbar button{flex:1;background:none;border:none;padding:10px 4px 9px;font-size:10px;
    color:var(--dim);font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:'Barlow',sans-serif;}
  nav.tabbar button svg{width:22px;height:22px;}
  nav.tabbar button.active{color:var(--blue);font-weight:700;}

  /* headings */
  .scrhead{padding:2px 2px 10px;}
  .bigtitle{font:800 28px 'Barlow Semi Condensed',sans-serif;color:var(--ink);letter-spacing:.01em;}
  .subtitle{font:500 12.5px 'Barlow',sans-serif;color:var(--muted2);margin-top:2px;}
  .eyebrow{font:700 11px 'Barlow',sans-serif;letter-spacing:.13em;color:var(--muted2);}
  .linetitle{font:700 15px 'Barlow Semi Condensed',sans-serif;color:var(--ink2);letter-spacing:.02em;margin-top:3px;}
  .backlink{display:flex;align-items:center;gap:4px;color:var(--blue-light);font:600 14px 'Barlow',sans-serif;background:none;border:none;padding:6px 0 2px;cursor:pointer;}

  /* cards & buttons */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:11px 0;
    box-shadow:0 1px 4px rgba(0,0,0,.25);}
  .card h2{margin:0 0 4px;font-size:16px;}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px 16px;
    font-size:15px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:'Barlow',sans-serif;}
  .btn:active{opacity:.85;}
  .btn.wide{width:100%;}
  .btn.ghost{background:var(--card);color:var(--ink2);border:1px solid var(--line3);}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:9px;}
  .btn.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
  .row{display:flex;align-items:center;gap:9px;}
  .between{justify-content:space-between;}
  .muted{color:var(--muted2);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--blue-bg);color:var(--blue-light);}
  input,select,textarea{font-size:16px;padding:10px 11px;border:1px solid var(--line3);border-radius:10px;background:var(--card2);color:var(--ink);width:100%;min-width:0;font-family:inherit;}
  input:not([type="checkbox"]):not([type="radio"]){-webkit-appearance:none;appearance:none;}
  label.fld{display:block;font-size:11.5px;font-weight:700;color:var(--muted2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px;}
  .empty{text-align:center;color:var(--muted2);padding:30px 10px;font-size:14px;}

  /* icon button */
  .iconbtn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted2);cursor:pointer;flex:none;}

  /* quarter pills / formation chips */
  .qpills{display:flex;gap:6px;margin:8px 0 10px;}
  .qpills button{flex:1;height:32px;border-radius:9px;background:var(--card);border:1px solid var(--line);color:var(--muted2);font:600 12px 'Barlow',sans-serif;cursor:pointer;}
  .qpills button.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;}
  .fchips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch;}
  .fchip{flex:none;height:34px;padding:0 14px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--muted2);font:600 13px 'Barlow Semi Condensed',sans-serif;letter-spacing:.03em;white-space:nowrap;cursor:pointer;}
  .fchip.active{background:var(--blue);color:#fff;border-color:var(--blue);}

  /* clock */
  .clockrow{display:flex;align-items:baseline;gap:10px;margin-top:6px;}
  .clockbig{font:800 52px/0.9 'Barlow Semi Condensed',sans-serif;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
  .clockbig.done{color:var(--red);}
  .livebadge{display:flex;align-items:center;gap:6px;padding:5px 9px;border-radius:7px;font:700 11px 'Barlow',sans-serif;letter-spacing:.06em;}
  .livebadge.on{background:var(--green-bg);color:var(--green);}
  .livebadge.on .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:gdblink 1.4s infinite;}
  .livebadge.off{background:rgba(255,255,255,.06);color:var(--muted2);}
  .livebadge.done{background:var(--red-bg);color:var(--red);}

  /* alert banner */
  .alertbar{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:14px;margin:2px 0 12px;}
  .alerticon{width:26px;height:26px;border-radius:8px;background:rgba(255,176,32,.2);color:var(--amber);display:flex;align-items:center;justify-content:center;font:800 15px 'Barlow',sans-serif;flex:none;}
  .alertmsg{flex:1;font:700 12.5px 'Barlow',sans-serif;color:#FFC451;}

  /* pitch */
  .field{position:relative;background:repeating-linear-gradient(180deg,#123726 0 44px,#0f3020 44px 88px);border:1px solid var(--line);border-radius:18px;height:420px;margin:8px 0;overflow:hidden;}
  .field.compact{height:270px;}
  .field .ln{position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(255,255,255,.13);}
  .field .cir{position:absolute;left:50%;top:50%;width:80px;height:80px;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.13);border-radius:50%;}
  .field .pbox{position:absolute;left:50%;transform:translateX(-50%);width:140px;height:44px;border:2px solid rgba(255,255,255,.11);}
  .field .pbox.t{top:0;border-top:none;border-radius:0 0 6px 6px;}
  .field .pbox.b{bottom:0;border-bottom:none;border-radius:6px 6px 0 0;}
  .slot{position:absolute;transform:translate(-50%,-50%);width:60px;text-align:center;z-index:2;cursor:pointer;}
  .slot .pos{font-size:9px;color:var(--muted2);font-weight:800;margin-top:2px;letter-spacing:.3px;}
  .slot .who{font-size:10.5px;color:var(--ink2);font-weight:600;line-height:1.15;}
  .slot .wasname{font-size:9px;color:var(--red);opacity:.9;font-weight:700;line-height:1.1;}
  .slot .tag{display:inline-block;font-size:9px;color:#fff;font-weight:800;background:var(--blue);border-radius:8px;padding:1px 6px;margin-top:1px;}
  .tiredmark{position:absolute;top:-3px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--amber);border:2px solid #0f3020;}
  .slot.dragover .jrsy{transform:scale(1.12);}
  .bench.benchover{outline:2px dashed var(--blue);outline-offset:2px;border-radius:10px;}
  .dragbubble{position:fixed;z-index:90;left:0;top:0;background:var(--blue);color:#fff;padding:7px 13px;border-radius:20px;

  h2.sec{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);margin:16px 2px 6px;}

<div class="overlay hidden" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
"use strict";
//// ---------- Formations ----------
let QLEN = 12;
const FORMATIONS = {
  "3-3-1": {label:"3-3-1", size:8, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:22,y:72},{id:"cb",pos:"CB",grp:"D",x:50,y:72},{id:"rb",pos:"RB",grp:"D",x:78,y:72},
    {id:"lm",pos:"LM",grp:"M",x:22,y:50},{id:"cm",pos:"CM",grp:"M",x:50,y:52},{id:"rm",pos:"RM",grp:"M",x:78,y:50},
    {id:"st",pos:"ST",grp:"F",x:50,y:28}]},
  "2-3-2": {label:"2-3-2", size:8, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:32,y:74},{id:"rb",pos:"RB",grp:"D",x:68,y:74},
    {id:"lm",pos:"LM",grp:"M",x:20,y:52},{id:"cm",pos:"CM",grp:"M",x:50,y:54},{id:"rm",pos:"RM",grp:"M",x:80,y:52},
    {id:"lf",pos:"LF",grp:"F",x:35,y:28},{id:"rf",pos:"RF",grp:"F",x:65,y:28}]},
  "3-2-2": {label:"3-2-2", size:8, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:22,y:74},{id:"cb",pos:"CB",grp:"D",x:50,y:73},{id:"rb",pos:"RB",grp:"D",x:78,y:74},
    {id:"lm",pos:"LM",grp:"M",x:32,y:52},{id:"rm",pos:"RM",grp:"M",x:68,y:52},
    {id:"lf",pos:"LF",grp:"F",x:35,y:28},{id:"rf",pos:"RF",grp:"F",x:65,y:28}]},
  "3-1-2-1": {label:"3-1-2-1", size:8, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:22,y:75},{id:"cb",pos:"CB",grp:"D",x:50,y:72},{id:"rb",pos:"RB",grp:"D",x:78,y:75},
    {id:"dm",pos:"DM",grp:"M",x:50,y:60},
    {id:"lm",pos:"LM",grp:"M",x:30,y:44},{id:"rm",pos:"RM",grp:"M",x:70,y:44},
    {id:"st",pos:"ST",grp:"F",x:50,y:26}]},
  // 7v7 fallbacks (6 outfield + GK) — used automatically when fewer than 8 are present
  "2-3-1 (7v7)": {label:"2-3-1 · 7v7", size:7, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:28,y:74},{id:"rb",pos:"RB",grp:"D",x:72,y:74},
    {id:"lm",pos:"LM",grp:"M",x:22,y:50},{id:"cm",pos:"CM",grp:"M",x:50,y:52},{id:"rm",pos:"RM",grp:"M",x:78,y:50},
    {id:"st",pos:"ST",grp:"F",x:50,y:28}]},
  "3-2-1 (7v7)": {label:"3-2-1 · 7v7", size:7, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:22,y:74},{id:"cb",pos:"CB",grp:"D",x:50,y:73},{id:"rb",pos:"RB",grp:"D",x:78,y:74},
    {id:"lm",pos:"LM",grp:"M",x:32,y:52},{id:"rm",pos:"RM",grp:"M",x:68,y:52},
    {id:"st",pos:"ST",grp:"F",x:50,y:28}]},
  // 6v6 fallbacks (5 outfield + GK)
  "2-2-1 (6v6)": {label:"2-2-1 · 6v6", size:6, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"lb",pos:"LB",grp:"D",x:30,y:74},{id:"rb",pos:"RB",grp:"D",x:70,y:74},
    {id:"lm",pos:"LM",grp:"M",x:30,y:50},{id:"rm",pos:"RM",grp:"M",x:70,y:50},
    {id:"st",pos:"ST",grp:"F",x:50,y:28}]},
  "1-3-1 (6v6)": {label:"1-3-1 · 6v6", size:6, slots:[
    {id:"gk",pos:"GK",grp:"GK",x:50,y:90},
    {id:"cb",pos:"CB",grp:"D",x:50,y:74},
    {id:"lm",pos:"LM",grp:"M",x:22,y:50},{id:"cm",pos:"CM",grp:"M",x:50,y:52},{id:"rm",pos:"RM",grp:"M",x:78,y:50},
    {id:"st",pos:"ST",grp:"F",x:50,y:28}]}
};
// All formation keys of a given total-player size (GK + outfield), largest-size-first for
// "closest fit at or below N" lookups.
function formationsOfSize(n){ return Object.keys(FORMATIONS).filter(k=>FORMATIONS[k].size===n); }
// Best-fit formation for however many players are actually present. Prefers an exact match
// (8/7/6); if present count doesn't land exactly on one of those, uses the largest supported
// size that doesn't exceed it, so we never assume more players than are there. Below 6, falls
// back to the smallest supported shape (6v6) — some slots will just show as open, same as today.
function bestFormationFor(n){
  const sizes=[8,7,6];
  let target=sizes.find(s=>s===n);
  if(!target) target=sizes.filter(s=>s<=n).sort((a,b)=>b-a)[0] || 6;
  const cur=state.settings.defaultFormation;
  if(FORMATIONS[cur] && FORMATIONS[cur].size===target) return cur;
  return formationsOfSize(target)[0];
}
const GRP_LABEL = {GK:"Keeper",D:"Defense",M:"Midfield",F:"Forward"};
const GRP_ORDER = ["GK","D","M","F"];
const GRP_COLOR = {GK:"#1f2a44",D:"#2f6fb0",M:"#1e3a8a",F:"#c0392b"};
// Jersey marker text: use the player's number if set, otherwise their initials.
function jerseyLabel(pid){ const p=state.roster.find(x=>x.id===pid);
  if(p && p.number!=null && String(p.number).trim()!=="") return String(p.number).trim();
  return initials(name(pid)); }
// Jersey marker: a circular badge. mode: "filled" (player on), "empty" (no one), "open" (vacated)
function jerseySVG(grp,label,mode){
  if(mode==="empty") return `<div class="jrsy jrsy-empty">+</div>`;
  if(mode==="open") return `<div class="jrsy jrsy-open"></div>`;
  const isGK=grp==="GK";
  const cls="jrsy"+(isGK?" jrsy-gk":" jrsy-"+String(grp).toLowerCase());
  return `<div class="${cls}">${esc(label)}</div>`;
}

//// ---------- State ----------
const KEY = "soccerGameTrackerV1";
// dismissedAlerts / activeSubAlert / _lastAlertKey are sub-timing-alert UI state — intentionally
// NOT saved to localStorage (see save()); they're a live sideline aid, not game history, and
// resetting on reload/game-switch is the right behavior.
let state, ui = {view:"games", gameId:null, qi:0, dismissedAlerts:{}, activeSubAlert:null, _lastAlertKey:undefined};

function blankQuarter(f){ return {formation:f, lineup:{}, subs:[], clock:{running:false,startedAt:null,elapsedMs:0}}; }
function defaultState(){
  return { roster:[], games:[], settings:{defaultFormation:"3-3-1", teamName:"", subAlertThreshold:6} };
}
function load(){
  try{ const r=localStorage.getItem(KEY); state = r? JSON.parse(r): defaultState(); }
  catch(e){ state = defaultState(); }
  if(!state.settings) state.settings={defaultFormation:"3-3-1",teamName:"",subAlertThreshold:6};
  // migrate older saves missing the sub-alert threshold setting
  if(state.settings.subAlertThreshold==null) state.settings.subAlertThreshold=6;
  // migrate older saved games that don't have a clock yet, or an `out` (injured/done-for-the-day) list
  (state.games||[]).forEach(g=>{
    (g.quarters||[]).forEach(q=>{ if(!q.clock) q.clock={running:false,startedAt:null,elapsedMs:0}; });
    if(!g.out) g.out=[];
  });
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function uid(p){ return p+Math.random().toString(36).slice(2,8); }
function name(id){ const p=state.roster.find(x=>x.id===id); return p? p.name : "—"; }
function fmt(m){ return (Math.round(m*10)/10).toString().replace(/\.0$/,""); }
function curGame(){ return state.games.find(g=>g.id===ui.gameId); }
// Our score = number of logged goals (falls back to a manually-entered score for older games with none logged)
function ourScore(g){ return Array.isArray(g.goals) ? g.goals.length : (parseInt(g.us)||0); }
//// ---------- Quarter clock ----------
function clockElapsedSec(q){
  if(!q || !q.clock) return 0;
  const c=q.clock; let ms=c.elapsedMs||0;
  if(c.running && c.startedAt) ms+=Math.max(0,Date.now()-c.startedAt);
  return Math.min(QLEN*60, Math.floor(ms/1000));
}
function clockRemainingLabel(q){
  const rem=Math.max(0, QLEN*60-clockElapsedSec(q));
  const m=Math.floor(rem/60), s=rem%60;
  return m+":"+String(s).padStart(2,"0");
}
function toggleClock(qi){
  const g=curGame(); if(!g) return; const q=g.quarters[qi];
  if(!q.clock) q.clock={running:false,startedAt:null,elapsedMs:0};
  if(q.clock.running){
    q.clock.elapsedMs=(q.clock.elapsedMs||0)+Math.max(0,Date.now()-q.clock.startedAt);
    q.clock.running=false; q.clock.startedAt=null;
  } else {
    if(clockElapsedSec(q)>=QLEN*60) return; // finished — nothing to resume, use Reset
    q.clock.running=true; q.clock.startedAt=Date.now();
  }
  save(); render();
}
function resetClock(qi){
  const g=curGame(); if(!g) return;
  g.quarters[qi].clock={running:false,startedAt:null,elapsedMs:0};
  save(); render();
}
// Current clock reading in minutes (nearest 0.5), for defaulting sub-minute fields to "right now."
// Returns null if the clock hasn't been started yet, so callers can fall back to a sensible default.
function clockMinuteNow(qi){
  const g=curGame(); if(!g) return null; const q=g.quarters[qi]; if(!q) return null;
  const sec=clockElapsedSec(q); if(sec<=0) return null;
  return Math.min(QLEN, Math.round((sec/60)*2)/2);
}
//// ---------- Sub-timing alert ----------
// Two triggers, checked every tick while a quarter's clock is running:
//  1) named player: any on-field outfield player who's hit `subAlertThreshold` consecutive
//     minutes (reuses the same consecutiveOutfieldMinutes signal Suggest Subs already relies on).
//  2) periodic checkpoint: every 5 game-minutes, a generic nudge if nobody's individually over
//     threshold yet — so you still get a prompt on quarters with lots of rotation already happening.
// Alerts are keyed so dismissing one doesn't suppress the *next* time the same player crosses
// another full threshold multiple, and keys are namespaced by game id so switching games can't
// leak a stale dismissal into a new one.
function computeSubAlert(){
  const g=curGame(); if(!g) return null;
  const qi=ui.qi; const q=g.quarters[qi]; if(!q || !q.clock || !q.clock.running) return null;
  const sec=clockElapsedSec(q); if(sec<=0) return null;
  const minute=sec/60;
  const threshold=Number(state.settings.subAlertThreshold)||6;
  ui.dismissedAlerts=ui.dismissedAlerts||{};
  const slots=FORMATIONS[q.formation].slots.filter(s=>s.grp!=="GK");
  let best=null;
  slots.forEach(s=>{
    const pid=slotOccupantAt(q,s.id,minute); if(!pid) return;
    const mins=consecutiveOutfieldMinutes(pid,qi,minute);
    if(mins>=threshold){
      const cycle=Math.floor(mins/threshold);
      const key="p:"+g.id+":"+qi+":"+pid+":"+cycle;
      if(!ui.dismissedAlerts[key] && (!best || mins>best.mins)){
        best={type:"player",key,msg:esc(name(pid))+" has been on <b>"+fmt(mins)+" min</b> straight — consider a sub."};
      }
    }
  });
  if(best) return best;
  const CP=5;
  const cpIdx=Math.floor(minute/CP);
  if(cpIdx>=1){
    const key="cp:"+g.id+":"+qi+":"+cpIdx;
    if(!ui.dismissedAlerts[key]){
      return {type:"checkpoint",key,msg:fmt(cpIdx*CP)+" min gone in Q"+(qi+1)+" — worth a quick playing-time check."};
    }
  }
  return null;
}
function dismissSubAlert(){
  ui.dismissedAlerts=ui.dismissedAlerts||{};
  if(ui.activeSubAlert) ui.dismissedAlerts[ui.activeSubAlert.key]=true;
  ui.activeSubAlert=null; ui._lastAlertKey=undefined;
  render();
}
// Lightweight tick — updates only the visible clock text directly rather than a full render(),
// so a running clock doesn't interrupt whatever the coach is doing (typing, an open sheet, etc).
// A full render() only fires when the sub-alert banner actually needs to appear/disappear/change,
// not on every 500ms tick, for the same reason.
setInterval(()=>{
  try{
    if(!state || !ui || ui.view!=="game") return;
    const g=curGame(); if(!g) return;
    const q=g.quarters[ui.qi]; if(!q || !q.clock) return;
    const el=document.getElementById("clockDisplay");
    if(el) el.textContent=clockRemainingLabel(q);
    if(q.clock.running && clockElapsedSec(q)>=QLEN*60){
      q.clock.elapsedMs=QLEN*60*1000; q.clock.running=false; q.clock.startedAt=null;
      save(); render(); return;
    }
    const alert=computeSubAlert();
    const key=alert?alert.key:null;
    if(key!==ui._lastAlertKey){
      ui._lastAlertKey=key; ui.activeSubAlert=alert;
      // Best-effort buzz when a NEW alert appears (not on dismiss/clear). No-op on browsers that
      // don't support it (notably iOS Safari) — the visible banner is the alert either way.
      if(alert && navigator.vibrate){ try{ navigator.vibrate(200); }catch(e){} }
      render();
    }
  }catch(e){}
}, 500);
//// ---------- Minutes engine ----------
// Per quarter: walk each slot's timeline from lineup[slot] (minute 0) through subs (sorted), to QLEN.
function quarterStints(q){
  const slots = FORMATIONS[q.formation].slots;
  // 1) raw intervals per slot
  const raw=[];
  slots.forEach(s=>{
    const evs = (q.subs||[]).filter(x=>x.slot===s.id).slice().sort((a,b)=>a.minute-b.minute);
    let cur = q.lineup[s.id]||null, t=0;
    evs.forEach(ev=>{
      let m=Math.max(0,Math.min(QLEN,ev.minute));
      if(cur && m>t) raw.push({pid:cur,slot:s.id,grp:s.grp,start:t,end:m});
      cur=ev.on; t=m;
    });
    if(cur && QLEN>t) raw.push({pid:cur,slot:s.id,grp:s.grp,start:t,end:QLEN});
  });
  // 2) a player can't be in two places at once — clip overlapping intervals so each
  //    instant is counted once (earliest-starting slot wins the time). This caps any
  //    player at 12.5/quarter even if they were subbed into a spot while already on.
  const byP={};
  raw.forEach(r=>{ (byP[r.pid]=byP[r.pid]||[]).push(r); });
  const out=[];
  Object.keys(byP).forEach(pid=>{
    const ivs=byP[pid].slice().sort((a,b)=> a.start-b.start || a.end-b.end);
    let coveredEnd=0;
    ivs.forEach(iv=>{
      const s=Math.max(iv.start, coveredEnd);
      if(iv.end>s){ out.push({pid:pid,slot:iv.slot,grp:iv.grp,min:iv.end-s}); coveredEnd=iv.end; }
    });
  });
  return out.filter(x=>x.min>0);
}
// Who occupies a given slot at a given minute (null if vacated/empty)
function slotOccupantAt(q,slotId,minute){
  const evs=(q.subs||[]).filter(x=>x.slot===slotId).slice().sort((a,b)=>a.minute-b.minute);
  let occ=q.lineup[slotId]||null;
  evs.forEach(ev=>{ if(ev.minute<=minute) occ=ev.on; });
  return occ;
}
// Which slot a player currently occupies at a given minute (or null if benched)
function occupantSlotOf(q,pid,minute){
  const slots=FORMATIONS[q.formation].slots;
  for(const s of slots){
    const evs=(q.subs||[]).filter(x=>x.slot===s.id).slice().sort((a,b)=>a.minute-b.minute);
    let occ=q.lineup[s.id]||null;
    evs.forEach(ev=>{ if(ev.minute<=minute) occ=ev.on; });
    if(occ===pid) return s.id;
  }
  return null;
}
function gameMinutes(g){
  const m={}; // pid -> {total, grp:{}, q:[0,0,0,0]}
  g.quarters.forEach((q,qi)=>{
    quarterStints(q).forEach(st=>{
      if(!m[st.pid]) m[st.pid]={total:0,grp:{GK:0,D:0,M:0,F:0},q:[0,0,0,0]};
      m[st.pid].total+=st.min; m[st.pid].grp[st.grp]+=st.min; m[st.pid].q[qi]+=st.min;
    });
  });
  return m;
}
function playerInQuarterMinutes(g,qi,pid){
  let s=0; quarterStints(g.quarters[qi]).forEach(st=>{ if(st.pid===pid) s+=st.min; }); return s;
}
//// ---------- Playing-time targets ----------
// Fair share = all field-minutes (however many are on the field at once × full game) split across
// everyone present, capped at a full game. Field size follows the formation actually in play
// (8/7/6), not a hardcoded 8, so smaller-squad games still produce a sane target.
// Present players still available to be selected for lineups/subs — everyone checked in EXCEPT
// anyone marked Injured/Out. `g.present` itself always keeps out-players in it (never remove them
// there) so their already-logged minutes keep showing in the minutes table, summaries, and season
// stats. Use this helper anywhere you're building a pool of who CAN still be picked to play.
function activePresent(g){ const out=g.out||[]; return (g.present||[]).filter(p=>!out.includes(p)); }
function fairShare(g){ const N=activePresent(g).length; if(!N) return 0; const fieldSize=Math.min(N,8); return Math.min(QLEN*4, fieldSize*QLEN*4 / N); }
function targetFor(g){ const t=(g.targetMin!=null && g.targetMin!=="")? parseFloat(g.targetMin):NaN; return isNaN(t)? fairShare(g): t; }
function ptStatus(total,target){ const tol=6; if(total<target-tol) return {k:"short",lbl:"▼ short"}; if(total>target+tol) return {k:"over",lbl:"▲ over"}; return {k:"on",lbl:"✓ on"}; }
function setTarget(v){ const g=curGame(); g.targetMin=(v===""||v==null)?null:v; save(); render(); }
//// ---------- Suggest next quarter ----------
function suggestionFor(qi){ const g=curGame(); const present=activePresent(g);
  if(qi===0) return present.slice(); // Q1: by arrival order
  const prior={}; present.forEach(p=>prior[p]=0);
  for(let i=0;i<qi;i++){ quarterStints(g.quarters[i]).forEach(st=>{ if(prior[st.pid]!=null) prior[st.pid]+=st.min; }); }
  return present.slice().sort((a,b)=>(prior[a]-prior[b])||(present.indexOf(a)-present.indexOf(b)));
}
function applySuggestion(qi){ if(qi===0) autoFill(qi); else suggestBalance(qi); }
//// ---------- Keepers (set first) ----------
function setKeeper(half,v){ const g=curGame(); g.keepers=g.keepers||{h1:null,h2:null}; g.keepers[half]=v||null; save(); render(); }
function keeperOptions(g,half){ const sel=(g.keepers&&g.keepers[half])||"";
  let o=`<option value="">— auto —</option>`;
  activePresent(g).forEach(pid=>{ o+=`<option value="${pid}" ${sel===pid?"selected":""}>${esc(name(pid))}${isGK(pid)?" 🧤":""}</option>`; });
  return o; }
// The keeper for a given quarter: explicit half-keeper → Keep-GK continuity → keeper pool → none.
function keeperForQuarter(qi){ const g=curGame(); const k=g.keepers||{};
  const who=qi<2?k.h1:k.h2;
  if(who && activePresent(g).includes(who)) return who;
  return null;
}
//// ---------- Whole-game auto-rotation ----------
function autoRotateGame(){
  const g=curGame(); const present=activePresent(g); const N=present.length;
  if(!N){ alert("Check players in first."); return; }
  const fit=bestFormationFor(N);
  if(N<6){ if(!confirm("Only "+N+" present (need at least 6 for a full side). Plan all 4 quarters anyway with some open spots?")) return; }
  else if(!confirm("Auto-plan all 4 quarters ("+FORMATIONS[fit].label+") for even minutes? This replaces lineups you've set.")) return;
  // 1) Decide the keeper for each quarter (explicit half-keepers first, then pool, then anyone).
  const poolPres=gkPoolPresent(); const kfb=poolPres.length?poolPres:present; const k=g.keepers||{};
  let kH1=(k.h1&&present.includes(k.h1))?k.h1:(g.keepGK!==false?(kfb[0]||null):null);
  let kH2=(k.h2&&present.includes(k.h2))?k.h2:(g.keepGK!==false?(kfb.find(p=>p!==kH1)||kfb[0]||null):null);
  const keeperByQ=[0,1,2,3].map(q=>{
    const ex=keeperForQuarter(q); if(ex) return ex;
    if(g.keepGK!==false) return q<2?kH1:kH2;
    return poolPres.length? poolPres[q%poolPres.length] : null; // keepGK off: rotate pool, else open
  });
  // 2) Allocate each quarter: keeper in goal (their goal minutes accrue here), lowest running plays outfield.
  const running={}; present.forEach(p=>running[p]=0);
  for(let q=0;q<4;q++){
    const keeper=keeperByQ[q];
    const fm=fit;
    const slots=FORMATIONS[fm].slots;
    const lineup={}; let fillSlots, cand;
    if(keeper){ lineup["gk"]=keeper; running[keeper]+=QLEN; fillSlots=slots.filter(s=>s.id!=="gk"); cand=present.filter(p=>p!==keeper); }
    else { fillSlots=slots.slice(); cand=present.slice(); }
    // who plays outfield: lowest running first; Q-tie breaks to earlier arrivals
    const order=cand.sort((a,b)=> (running[a]-running[b]) || (present.indexOf(a)-present.indexOf(b)) );
    let playOut=order.slice(0,fillSlots.length);
    let rot=playOut.slice(); if(rot.length){ const off=(q*3)%rot.length; rot=rot.slice(off).concat(rot.slice(0,off)); } // vary positions
    rot.forEach((pid,i)=>{ lineup[fillSlots[i].id]=pid; });
    playOut.forEach(p=>{ running[p]+=QLEN; });
    g.quarters[q]={formation:fm, lineup, subs:[], clock:{running:false,startedAt:null,elapsedMs:0}};
  }
  rebalanceAuto(g,present,keeperByQ);   // even out totals (spread to one quarter)
  protectKeepers(g,present,keeperByQ);  // and make sure keepers aren't the ones stuck playing a full game
  ui.qi=0; save(); render();
}
// Move a keeper's outfield time to a rested, lower-total bench player so keepers don't play the whole game.
function protectKeepers(g,present,keeperByQ){
  const keepers=[...new Set(keeperByQ.filter(Boolean))];
  for(let iter=0;iter<300;iter++){
    const t=autoTotals(g,present); let moved=false;
    for(const kp of keepers){
      for(let q=0;q<4 && !moved;q++){
        if(keeperByQ[q]===kp) continue;                 // this is a quarter the keeper is in goal — leave it
        const slots=FORMATIONS[g.quarters[q].formation].slots;
        let kpSlot=null; slots.forEach(s=>{ if(s.id!=="gk" && g.quarters[q].lineup[s.id]===kp) kpSlot=s.id; });
        if(!kpSlot) continue;                            // keeper isn't playing outfield this quarter
        const onQ=new Set(slots.map(s=>g.quarters[q].lineup[s.id]).filter(Boolean));
        let cand=null; present.forEach(p=>{ if(!onQ.has(p) && p!==keeperByQ[q] && t[p] < t[kp]-0.1 && (!cand || t[p]<t[cand])) cand=p; });
        if(cand){ g.quarters[q].lineup[kpSlot]=cand; moved=true; }  // keeper rests, rested player comes on
      }
      if(moved) break;
    }
    if(!moved) break;
  }
}
// Total minutes per player in an auto-plan (no subs) = 12 per slot occupied, including goal.
function autoTotals(g,present){ const t={}; present.forEach(p=>t[p]=0);
  g.quarters.forEach(q=>{ FORMATIONS[q.formation].slots.forEach(s=>{ const pid=q.lineup[s.id]; if(pid&&t[pid]!=null) t[pid]+=QLEN; }); }); return t; }
// Local-search: repeatedly move the highest-total player out of an outfield slot for the lowest-total benched player.
function rebalanceAuto(g,present,keeperByQ){
  for(let iter=0;iter<400;iter++){
    const t=autoTotals(g,present);
    let hi=present[0], lo=present[0];
    present.forEach(p=>{ if(t[p]>t[hi])hi=p; if(t[p]<t[lo])lo=p; });
    if(t[hi]-t[lo] <= QLEN) break; // already within one quarter — optimal
    let done=false;
    for(let q=0;q<4 && !done;q++){
      if(hi===keeperByQ[q] || lo===keeperByQ[q]) continue;      // don't touch a quarter's keeper
      const slots=FORMATIONS[g.quarters[q].formation].slots;
      if(slots.some(s=>g.quarters[q].lineup[s.id]===lo)) continue; // lo must be on the bench this quarter
      let hiSlot=null; slots.forEach(s=>{ if(s.id!=="gk" && g.quarters[q].lineup[s.id]===hi) hiSlot=s.id; });
      if(hiSlot){ g.quarters[q].lineup[hiSlot]=lo; done=true; }   // swap: hi rests, lo plays
    }
    if(!done) break; // no beneficial swap available
  }
}

function fmtDateLong(d){
  if(!d) return "";
  try{ const dt=new Date(d+"T00:00:00"); if(isNaN(dt.getTime())) return d;
    return dt.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric",year:"numeric"});
  }catch(e){ return d; }
}

//// ---------- Game mutations ----------
function setGame(k,v){ const g=curGame(); g[k]=v; save(); if(k==="opp"||k==="date"){} }
function setQ(i){ ui.qi=i; ui.activeSubAlert=null; ui._lastAlertKey=undefined; render(); }
function toggleAttend(pid){ const g=curGame(); g.present=g.present||[]; g.out=g.out||[];
  const i=g.present.indexOf(pid);
  if(i>=0){
    // Already checked in and being un-checked. If they've already logged any minutes this game,
    // fully removing them here would silently delete that history from past quarters' lineup/sub
    // data. Route through the safe Injured/Out path instead — it keeps them present (so their
    // minutes keep showing everywhere) but drops them from future selection.
    const played=((gameMinutes(g)[pid]||{}).total||0) > 0;
    if(played){ setPlayerOut(pid,true); return; }
    g.present.splice(i,1); // nothing played yet — safe to fully remove (e.g. correcting a mis-tap)
    g.quarters.forEach(q=>{ Object.keys(q.lineup).forEach(s=>{ if(q.lineup[s]===pid) delete q.lineup[s]; });
      q.subs=(q.subs||[]).filter(x=>x.on!==pid); });
    clearTired(pid);
  } else {
    const oi=g.out.indexOf(pid); if(oi>=0) g.out.splice(oi,1); // re-checking in clears any stale Out flag
    g.present.push(pid);
  }
  // For any quarter nobody's touched yet (empty lineup, no subs), keep its formation matched to
  // how many are actually active present today — nothing to lose since there's no lineup to clear.
  const fit=bestFormationFor(activePresent(g).length);
  g.quarters.forEach(q=>{ if(!Object.keys(q.lineup).length && !(q.subs||[]).length) q.formation=fit; });
  save(); render();
}
// Marks a checked-in player Injured/Out (out=true) or reactivates them (out=false). Unlike
// toggleAttend's removal path, this NEVER touches q.lineup/q.subs — past quarters they already
// played keep their minutes intact in the minutes table, summaries, and season stats. It only
// takes them out of the pool used for picking future lineups/subs/keepers (see activePresent()).
function setPlayerOut(pid,out){
  const g=curGame(); g.out=g.out||[]; g.present=g.present||[];
  if(!g.present.includes(pid)) return; // must already be checked in
  const i=g.out.indexOf(pid);
  if(out && i<0) g.out.push(pid);
  if(!out && i>=0) g.out.splice(i,1);
  if(out) clearTired(pid);
  const fit=bestFormationFor(activePresent(g).length);
  g.quarters.forEach(q=>{ if(!Object.keys(q.lineup).length && !(q.subs||[]).length) q.formation=fit; });
  save(); render();
}
function setFormation(qi,f){ const g=curGame(); const q=g.quarters[qi];
  if(q.formation!==f && (Object.keys(q.lineup).length||q.subs.length)){
    if(!confirm("Changing formation clears this quarter's lineup. Continue?")){ render(); return; }
  }
  q.formation=f; q.lineup={}; q.subs=[]; save(); render();
}
// ---- Keeper pool ----
function isGK(pid){ const p=state.roster.find(x=>x.id===pid); return !!(p&&p.gk); }
function gkPoolPresent(){ const g=curGame(); return activePresent(g).filter(isGK); }
// Returns the keeper to lock for this quarter (prev quarter's GK if keeping, else a rotating pool keeper), or null
function keepGKFor(qi){ const g=curGame(); if(g.keepGK===false || qi<1) return null;
  const gk=slotOccupantAt(g.quarters[qi-1],"gk",QLEN);
  return (gk && activePresent(g).includes(gk)) ? gk : null;
}
function gkForFill(qi){ const ex=keeperForQuarter(qi); if(ex) return ex;
  const k=keepGKFor(qi); if(k) return k;
  const pool=gkPoolPresent(); return pool.length ? pool[qi % pool.length] : null;
}
function setKeepGK(v){ const g=curGame(); g.keepGK=v; save(); }
function autoFill(qi){ const g=curGame(); const q=g.quarters[qi];
  const slots=FORMATIONS[q.formation].slots;
  q.lineup={};
  let pool=activePresent(g), fillSlots=slots.slice();
  const gk=gkForFill(qi);
  if(gk){ q.lineup["gk"]=gk; pool=pool.filter(p=>p!==gk); fillSlots=fillSlots.filter(s=>s.id!=="gk"); }
  pool.slice(0,fillSlots.length).forEach((pid,i)=>{ q.lineup[fillSlots[i].id]=pid; });
  save(); render();
}
function suggestBalance(qi){ const g=curGame(); const q=g.quarters[qi];
  const slots=FORMATIONS[q.formation].slots; const present=activePresent(g);
  if(!present.length){ alert("Check players in first."); return; }
  // minutes each present player has so far in earlier quarters this game
  const prior={}; present.forEach(p=>prior[p]=0);
  for(let i=0;i<qi;i++){ quarterStints(g.quarters[i]).forEach(st=>{ if(prior[st.pid]!=null) prior[st.pid]+=st.min; }); }
  q.lineup={}; q.subs=[];
  let pool=present.slice(), fillSlots=slots.slice();
  const gk=gkForFill(qi);
  if(gk){ q.lineup["gk"]=gk; pool=pool.filter(p=>p!==gk); fillSlots=fillSlots.filter(s=>s.id!=="gk"); }
  // least-played first; tie-break by arrival order
  const order=pool.sort((a,b)=> (prior[a]-prior[b]) || (present.indexOf(a)-present.indexOf(b)) );
  order.slice(0,fillSlots.length).forEach((pid,i)=>{ q.lineup[fillSlots[i].id]=pid; });
  save(); render();
}
// Start this quarter from the PREVIOUS quarter's final on-field players (after its subs)
function carryOver(qi){ const g=curGame(); if(qi<1) return; const prev=g.quarters[qi-1];
  const slots=FORMATIONS[prev.formation].slots; const lineup={};
  slots.forEach(s=>{ const occ=slotOccupantAt(prev,s.id,QLEN); if(occ) lineup[s.id]=occ; });
  // starting a new quarter — its clock always begins fresh, regardless of the previous quarter's
  g.quarters[qi]={formation:prev.formation, lineup:lineup, subs:[], clock:{running:false,startedAt:null,elapsedMs:0}};
  save(); render();
}
function clearQ(qi){ const g=curGame(); g.quarters[qi].lineup={}; g.quarters[qi].subs=[]; save(); render(); }
// Shift whoever's currently in this quarter's lineup between defense/midfield/forward —
// for squads with no bench to sub from. Leaves the goalkeeper alone (managed separately).
// Slots within each FORMATIONS entry are already ordered D-block, then M-block, then F-block,
// so a circular shift by the size of the D group moves each block into the next area.
function rotateAreas(qi){
  const g=curGame(); const q=g.quarters[qi];
  const formation=FORMATIONS[q.formation];
  const gk=gkForFill(qi); // settings-derived keeper (explicit half pick, "keep last keeper", or a real pool) — null if truly auto with no info
  const priorGk=q.lineup.gk||null;

  if(gk){
    // Settings have an opinion on who's keeper — respect it. If that means a handoff (someone
    // different from whoever Carry over left in goal), swap them onto the field instead of
    // letting the outgoing keeper quietly fall off the lineup, then rotate the outfield as usual.
    const outSlots=formation.slots.filter(s=>s.grp!=="GK");
    let pool=activePresent(g).filter(p=>p!==gk);
    let current=outSlots.map(s=>q.lineup[s.id]||null);
    if(priorGk && priorGk!==gk){
      const idx=current.indexOf(gk);
      if(idx>=0) current[idx]=priorGk;
      else { const empty=current.indexOf(null); if(empty>=0) current[empty]=priorGk; }
    }
    const used=new Set(current.filter(Boolean));
    const spare=pool.filter(p=>!used.has(p));
    current=current.map(pid=> pid || spare.shift() || null);
    if(!current.some(Boolean)){ alert("Check players in and set a lineup first."); return; }
    const dCount=outSlots.filter(s=>s.grp==="D").length;
    const shifted=current.slice(dCount).concat(current.slice(0,dCount));
    const lineup={gk:gk};
    outSlots.forEach((s,i)=>{ if(shifted[i]) lineup[s.id]=shifted[i]; });
    q.lineup=lineup; q.subs=[]; save(); render();
    return;
  }

  // No settings-derived keeper at all (both halves on auto, "keep last keeper" off, and no
  // keeper tagged in the pool) — treat goal as just another rotating area so it's never left
  // empty and whoever was in goal always lands somewhere real on the field.
  const allSlots=formation.slots; // ordered GK, then D-block, then M-block, then F-block
  let pool=activePresent(g);
  let current=allSlots.map(s=>q.lineup[s.id]||null);
  const used=new Set(current.filter(Boolean));
  const spare=pool.filter(p=>!used.has(p));
  current=current.map(pid=> pid || spare.shift() || null);
  if(!current.some(Boolean)){ alert("Check players in and set a lineup first."); return; }
  const gkCount=allSlots.filter(s=>s.grp==="GK").length;
  const shifted=current.slice(gkCount).concat(current.slice(0,gkCount));
  const lineup={};
  allSlots.forEach((s,i)=>{ if(shifted[i]) lineup[s.id]=shifted[i]; });
  q.lineup=lineup; q.subs=[]; save(); render();
}
function assignSlot(qi,slot,pid){ const g=curGame(); const q=g.quarters[qi];
  if(pid){ // remove pid from any other slot
    Object.keys(q.lineup).forEach(s=>{ if(q.lineup[s]===pid) delete q.lineup[s]; });
    q.lineup[slot]=pid;
  } else delete q.lineup[slot];
  save(); closeSheet(); render();
}
function delSub(qi,id){ const g=curGame(); const q=g.quarters[qi]; q.subs=q.subs.filter(x=>x.id!==id); save(); render(); }

function openPicker(qi,slot){
  const g=curGame(); const q=g.quarters[qi];
  const sObj=FORMATIONS[q.formation].slots.find(x=>x.id===slot);
  const onField=Object.values(q.lineup).filter(Boolean);
  let h=`<h3>${sObj.pos} · ${GRP_LABEL[sObj.grp]}</h3>`;
  h+=`<div class="muted" style="font-size:12.5px;margin-bottom:6px">Choose who starts the quarter here. ✓ = already on the field.</div>`;
  const pickPool=activePresent(g);
  pickPool.forEach((pid,i)=>{
    const used=onField.includes(pid)&&q.lineup[slot]!==pid;
    const here=q.lineup[slot]===pid;
    const rp=state.roster.find(x=>x.id===pid);
    const noteHtml=(rp&&rp.notes)? `<div class="muted" style="font-size:11px;margin-top:1px">${esc(rp.notes)}</div>`:"";
    h+=`<div class="pickrow" onclick="assignSlot(${qi},'${slot}','${pid}')" style="${here?'border-color:var(--green);background:var(--green-bg)':''}">
      <span class="ord">${i+1}</span><div style="flex:1"><div>${esc(name(pid))}</div>${noteHtml}</div>
      ${here?'<span class="pill">starting here</span>':(used?'<span class="muted" style="font-size:12px">✓ on field</span>':'')}</div>`;
  });
  if(!pickPool.length) h+=`<div class="muted">No one is checked in yet.</div>`;
  if(q.lineup[slot]) h+=`<div class="pickrow clear" onclick="assignSlot(${qi},'${slot}','')">Clear this position</div>`;
  h+=`<button class="btn ghost wide" style="margin-top:8px" onclick="closeSheet()">Cancel</button>`;
  showSheet(h);
}
function openSub(qi, presetOn){

  let h=`<h3>Mid-quarter sub · Q${qi+1}</h3>`;

  slots.forEach(s=>{ const cur=q.lineup[s.id]; h+=`<option value="${s.id}">${s.pos} — ${cur?esc(name(cur)):"(empty)"}</option>`; });

  h+=`<label class="fld">Minute of the sub</label><input id="subMin" type="number" inputmode="decimal" min="0" max="${QLEN}" step="0.5" value="${clockMinuteNow(qi)??6}">`;
  const benchP=[], fieldP=[]; const activeSet=new Set(activePresent(g));
  (g.present||[]).forEach(pid=>{ const sl=occupantSlotOf(q,pid,QLEN);
    if(sl) fieldP.push({pid,sl}); else if(activeSet.has(pid)) benchP.push(pid); });

      h+=`<option value="${o.pid}" ${o.pid===presetOn?"selected":""}>${esc(name(o.pid))} — on at ${sObj?sObj.pos:""}</option>`; }); h+=`</optgroup>`; }

function saveSub(qi){
  const g=curGame(); const q=g.quarters[qi];
  const slot=document.getElementById("subSlot").value;
  let minute=parseFloat(document.getElementById("subMin").value);
  const on=document.getElementById("subOn").value;
  if(isNaN(minute)) minute=0; minute=Math.max(0,Math.min(QLEN,minute));
  q.subs=q.subs||[];
  // Whoever's currently in this slot is coming off — clear their tired flag now that they're resting.
  clearTired(slotOccupantAt(q,slot,minute));
  // If this player is already on the field elsewhere, this is a position move —
  // vacate their old spot at the same minute so they aren't counted twice.
  const occSlot=occupantSlotOf(q,on,minute);
  q.subs.push({id:uid("s"),slot,minute,on});
  if(occSlot && occSlot!==slot){
    q.subs.push({id:uid("s"),slot:occSlot,minute,on:null});
    const sObj=FORMATIONS[q.formation].slots.find(x=>x.id===occSlot);
    save(); closeSheet(); render();
    setTimeout(()=>alert(name(on)+" was already on at "+sObj.pos+", so I moved her here and left "+sObj.pos+" open. Assign someone to "+sObj.pos+" to keep 8 on the field."),60);
    return;
  }
  save(); closeSheet(); render();
}
// ---- Full-bench (mass) sub ----
function openMassSub(qi){
  const g=curGame(); const q=g.quarters[qi]; const present=activePresent(g);
  const slots=FORMATIONS[q.formation].slots;
  const onField=slots.map(s=>({slot:s.id,pos:s.pos,grp:s.grp,pid:slotOccupantAt(q,s.id,QLEN)})).filter(x=>x.pid);
  const benchNow=present.filter(p=>!onField.some(f=>f.pid===p));
  if(!benchNow.length){ alert("No one is on the bench to sub in."); return; }
  const hasTired=(g.tired||[]).some(pid=>onField.some(f=>f.pid===pid));
  let h=`<h3>Sub the whole bench · Q${qi+1}</h3>`;
  h+=hasTired
    ? `<div class="note">Brings every bench player on, swapping out your flagged 😓 tired players first. Minutes split automatically.</div>`
    : `<div class="note">Brings every bench player on at once, swapping out whoever's been on the field longest without a break (goalie time doesn't count). Tap a player below the field to flag them tired instead. Minutes split automatically.</div>`;
  h+=`<label class="fld">Minute of the sub</label><input id="msMin" type="number" inputmode="decimal" min="0" max="${QLEN}" step="0.5" value="${clockMinuteNow(qi)??6}">`;
  h+=`<label class="row" style="gap:8px;margin-top:10px;font-size:14px;font-weight:600"><input type="checkbox" id="msKeepGk" checked style="width:auto"> Keep the keeper on (don't swap GK)</label>`;
  h+=`<div id="msPreview"></div>`;
  h+=`<div class="row" style="margin-top:14px;gap:8px"><button class="btn wide" onclick="applyMassSub(${qi})">Swap them in</button>
    <button class="btn ghost" onclick="closeSheet()">Cancel</button></div>`;
  showSheet(h);
  renderMassPreview(qi);
  document.getElementById("msKeepGk").addEventListener("change",()=>renderMassPreview(qi));
}
function massPairs(qi){
  const g=curGame(); const q=g.quarters[qi]; const present=activePresent(g);
  const slots=FORMATIONS[q.formation].slots;
  const keepGk=document.getElementById("msKeepGk")? document.getElementById("msKeepGk").checked : true;
  const onField=slots.map(s=>({slot:s.id,pos:s.pos,grp:s.grp,pid:slotOccupantAt(q,s.id,QLEN)})).filter(x=>x.pid);
  const benchNow=present.filter(p=>!onField.some(f=>f.pid===p));
  // total minutes so far under the current plan — brings on the freshest bench players first
  const proj={}; present.forEach(p=>proj[p]=0);
  g.quarters.forEach(qq=>{ quarterStints(qq).forEach(st=>{ if(proj[st.pid]!=null) proj[st.pid]+=st.min; }); });
  const bench=benchNow.slice().sort((a,b)=> proj[a]-proj[b]);
  let swap=onField.filter(f=> !(keepGk && f.grp==="GK"));
  const tired=(g.tired||[]);
  const tiredOff=swap.filter(f=>tired.includes(f.pid)).sort((a,b)=> proj[b.pid]-proj[a.pid]);
  const restOff=swap.filter(f=>!tired.includes(f.pid))
    .sort((a,b)=> consecutiveOutfieldMinutes(b.pid,qi,QLEN)-consecutiveOutfieldMinutes(a.pid,qi,QLEN));
  swap=tiredOff.concat(restOff); // flagged-tired players always come off first, regardless of minutes
  const n=Math.min(bench.length, swap.length); const pairs=[];
  for(let i=0;i<n;i++){ pairs.push({on:bench[i], slot:swap[i].slot, pos:swap[i].pos, off:swap[i].pid}); }
  return {pairs, leftover: bench.length-n};
}
function renderMassPreview(qi){
  const {pairs,leftover}=massPairs(qi);
  let h=`<div class="ltlabel" style="margin-top:12px">Swaps (${pairs.length})</div>`;
  if(!pairs.length) h+=`<div class="muted" style="font-size:13px">No outfield players available to swap.</div>`;
  pairs.forEach(p=>{ h+=`<div class="sub-item"><span style="flex:1"><b>${esc(firstName(name(p.on)))}</b> ⟶ ${p.pos} <span class="muted">(off ${esc(firstName(name(p.off)))})</span></span></div>`; });
  if(leftover>0) h+=`<div class="muted" style="font-size:12.5px;margin-top:4px">${leftover} bench player${leftover>1?"s":""} can't come on (not enough outfield spots). Uncheck "keep the keeper" or sub them individually.</div>`;
  document.getElementById("msPreview").innerHTML=h;
}
function applyMassSub(qi){
  const g=curGame(); const q=g.quarters[qi];
  let minute=parseFloat(document.getElementById("msMin").value);
  if(isNaN(minute)) minute=0; minute=Math.max(0,Math.min(QLEN,minute));
  const {pairs}=massPairs(qi);
  if(!pairs.length){ alert("No swaps to apply."); return; }
  q.subs=q.subs||[];
  pairs.forEach(p=>{ q.subs.push({id:uid("s"),slot:p.slot,minute,on:p.on}); clearTired(p.off); });
  save(); closeSheet(); render();
}
// ---- Tired flag (manual, coach-observed) ----
function isTired(pid){ const g=curGame(); return !!(g && g.tired && g.tired.includes(pid)); }
function toggleTired(pid){ const g=curGame(); if(!g) return; g.tired=g.tired||[];
  const i=g.tired.indexOf(pid); if(i>=0) g.tired.splice(i,1); else g.tired.push(pid);
  save(); render(); }
// Clears the tired flag once a player actually comes off the field — so if they go back on
// later, they start fresh instead of immediately showing tired again from a stale flag.
function clearTired(pid){ const g=curGame(); if(g && g.tired && pid) g.tired=g.tired.filter(p=>p!==pid); }
// Consecutive minutes a player has been on the field (any position), ending at (qi,atMinute),
// not counting time spent in goal. The streak breaks the moment they're off the field entirely,
// and can carry across a quarter boundary if they were never benched.
function consecutiveOutfieldMinutes(pid,qi,atMinute){
  const g=curGame(); if(!g) return 0;
  const STEP=0.5; let total=0, q=qi, t=Math.max(0,Math.min(QLEN,atMinute));
  while(q>=0){
    const quarter=g.quarters[q]; if(!quarter) break;
    let stopped=false;
    while(t>0){
      const mid=t-STEP/2;
      const slot=occupantSlotOf(quarter,pid,mid);
      if(!slot){ stopped=true; break; }
      if(slot!=="gk") total+=STEP;
      t-=STEP;
    }
    if(stopped) break;
    q--; t=QLEN;
  }
  return total;
}
// ---- Suggested subs (parity + rest) ----
// Priority 1: any coach-flagged tired players currently on the field — trust the eye test.
// Priority 2 (fallback, nobody flagged): whoever has the longest unbroken stretch on the field,
// not counting goalie minutes. Paired with the lowest-total-minutes bench players (fairest to bring on).
function suggestSubPairs(qi,minute){
  const g=curGame(); const q=g.quarters[qi]; const present=activePresent(g);
  const slots=FORMATIONS[q.formation].slots;
  // total minutes played so far under the current plan — used to pick who comes ON (fairness)
  const proj={}; present.forEach(p=>proj[p]=0);
  g.quarters.forEach(qq=>{ quarterStints(qq).forEach(st=>{ if(proj[st.pid]!=null) proj[st.pid]+=st.min; }); });
  const onField=slots.filter(s=>s.grp!=="GK")
    .map(s=>({slot:s.id,pos:s.pos,pid:slotOccupantAt(q,s.id,minute)})).filter(x=>x.pid);
  const benchNow=present.filter(p=> !slots.some(s=>slotOccupantAt(q,s.id,minute)===p) );
  const onCands=benchNow.slice().sort((a,b)=> proj[a]-proj[b]); // fewest minutes first

  const tired=(g.tired||[]);
  const tiredOnField=onField.filter(f=>tired.includes(f.pid));
  let offCands, overrideGuard;
  if(tiredOnField.length){
    offCands=tiredOnField.slice().sort((a,b)=> proj[b.pid]-proj[a.pid]);
    overrideGuard=true; // manual flag always wins, regardless of minute balance
  } else {
    offCands=onField.slice().sort((a,b)=> consecutiveOutfieldMinutes(b.pid,qi,minute)-consecutiveOutfieldMinutes(a.pid,qi,minute));
    overrideGuard=false;
  }

  const pairs=[]; const n=Math.min(offCands.length,onCands.length);
  for(let i=0;i<n;i++){
    const offPid=offCands[i].pid;
    const ok = overrideGuard ? true
      : (consecutiveOutfieldMinutes(offPid,qi,minute) > 0 && proj[offPid] > proj[onCands[i]] + 0.1);
    if(ok) pairs.push({slot:offCands[i].slot,pos:offCands[i].pos,off:offPid,on:onCands[i]});
  }
  return pairs;
}
function openSuggestSubs(qi){
  const g=curGame(); const hasTired=(g.tired||[]).length>0;
  let h=`<h3>Suggest subs · Q${qi+1}</h3>`;
  h+=hasTired
    ? `<div class="note">Bringing off your flagged 😓 tired players first, paired with your lowest-minute bench players. The keeper stays on. Minutes split automatically.</div>`
    : `<div class="note">No one's flagged tired, so this brings on your freshest bench players for whoever's been on the field longest without a break (goalie time doesn't count against them). Tap a player below the field to flag them tired instead. The keeper stays on.</div>`;
  h+=`<label class="fld">Minute of the subs</label><input id="ssMin" type="number" inputmode="decimal" min="0" max="${QLEN}" step="0.5" value="${clockMinuteNow(qi)??6}" onchange="renderSuggestPreview(${qi})">`;
  h+=`<div id="ssPreview"></div>`;
  h+=`<div class="row" style="margin-top:14px;gap:8px"><button class="btn wide" onclick="applySuggestSubs(${qi})">Apply these subs</button>
    <button class="btn ghost" onclick="closeSheet()">Cancel</button></div>`;
  showSheet(h); renderSuggestPreview(qi);
}
function renderSuggestPreview(qi){
  const m=Math.max(0,Math.min(QLEN, parseFloat(document.getElementById("ssMin").value)||0));
  const pairs=suggestSubPairs(qi,m);
  let h=`<div class="ltlabel" style="margin-top:12px">Suggested swaps (${pairs.length})</div>`;
  if(!pairs.length) h+=`<div class="muted" style="font-size:13px">Minutes are already balanced — no subs needed here.</div>`;
  pairs.forEach(p=>{ h+=`<div class="sub-item"><span style="flex:1"><b>${esc(firstName(name(p.on)))}</b> on ⟶ ${p.pos} <span class="muted">(rest ${esc(firstName(name(p.off)))})</span></span></div>`; });
  document.getElementById("ssPreview").innerHTML=h;
}
function applySuggestSubs(qi){
  const g=curGame(); const q=g.quarters[qi];
  const m=Math.max(0,Math.min(QLEN, parseFloat(document.getElementById("ssMin").value)||0));
  const pairs=suggestSubPairs(qi,m);
  if(!pairs.length){ alert("Minutes are already balanced — no subs suggested."); return; }
  q.subs=q.subs||[];
  pairs.forEach(p=>{ q.subs.push({id:uid("s"),slot:p.slot,minute:m,on:p.on}); clearTired(p.off); });
  save(); closeSheet(); render();
}

//// ---------- Lineup builder ----------
function renderLineupScreen(){
  const g=curGame();
  if(!g) return emptyGameState("Lineup","Open or start a game to build quarter-by-quarter lineups.");
  const activeP=activePresent(g);
  const q=g.quarters[ui.qi];
  let h=`<div class="scrhead"><div class="bigtitle">Lineup</div><div class="subtitle">${activeP.length} present · drag to place</div></div>`;
  h+=`<div class="qpills">`;
  for(let i=0;i<4;i++) h+=`<button class="${i===ui.qi?'active':''}" onclick="setQ(${i})">Q${i+1}</button>`;
  h+=`</div>`;
  h+=`<div class="fchips">`;
  Object.keys(FORMATIONS).forEach(f=>{ h+=`<button class="fchip ${q.formation===f?'active':''}" onclick="setFormation(${ui.qi},'${f}')">${FORMATIONS[f].label}</button>`; });
  h+=`</div>`;
  if(activeP.length && Object.values(q.lineup).filter(Boolean).length===0){
    const sug=suggestionFor(ui.qi).slice(0,8).map(p=>esc(firstName(name(p)))).join(", ");
    h+=`<div class="suggest"><b>Q${ui.qi+1} isn't set yet.</b> ${ui.qi===0?"Suggested starters by arrival order:":"Lowest minutes so far — suggested to start:"} ${sug}.
      <div style="margin-top:8px"><button class="btn sm" onclick="applySuggestion(${ui.qi})">${ui.qi===0?"Apply by arrival":"Apply balanced lineup"}</button></div></div>`;
  }
  if(!activeP.length) h+=`<div class="note">Check players in on the Roster tab, then come back to set the lineup.</div>`;
  h+=`<div class="field">`;
  h+=`<div class="ln"></div><div class="cir"></div><div class="pbox t"></div><div class="pbox b"></div>`;
  FORMATIONS[q.formation].slots.forEach(s=>{
    const startPid=q.lineup[s.id]||null;
    const curPid=slotOccupantAt(q,s.id,QLEN);
    const open=(curPid===null && startPid!==null);
    let disc,who="",tag="";
    if(open){ disc=jerseySVG(s.grp,"","open"); who=`<div class="wasname">OPEN · was ${esc(firstName(name(startPid)))}</div>`; }
    else if(startPid){ disc=jerseySVG(s.grp,jerseyLabel(startPid),"filled"); who=`<div class="who">${esc(firstName(name(startPid)))}</div>`;
      if(curPid && curPid!==startPid) tag=`<div class="tag">▸ ${esc(firstName(name(curPid)))}</div>`; }
    else if(curPid){ disc=jerseySVG(s.grp,jerseyLabel(curPid),"filled"); who=`<div class="who">${esc(firstName(name(curPid)))}</div>`; }
    else disc=jerseySVG(s.grp,"","empty");
    const dragPid=(startPid && !open)? startPid : "";
    h+=`<div class="slot ${s.grp.toLowerCase()}" data-slot="${s.id}" data-drag="slot" data-pid="${dragPid}" style="left:${s.x}%;top:${s.y}%">
      ${disc}<div class="pos">${s.pos}</div>${who}${tag}</div>`;
  });
  h+=`</div>`;
  h+=`<div class="muted" style="font-size:11.5px;margin:5px 2px 0">Drag a bench chip or player onto a spot · tap a spot to pick · <span style="color:var(--red);font-weight:700">OPEN</span> = vacated, fill it with a sub.</div>`;
  const onField=Object.values(q.lineup).filter(Boolean);
  const bench=activeP.filter(p=>!onField.includes(p));
  h+=`<div class="ltools">
    <div class="ltlabel">Fill the lineup</div>
    <div class="fillgrid">
      <button class="btn ghost sm" onclick="suggestBalance(${ui.qi})">⚖︎ Balance time</button>
      <button class="btn ghost sm" onclick="autoFill(${ui.qi})">↻ By arrival order</button>
      ${ui.qi>0?`<button class="btn ghost sm" onclick="carryOver(${ui.qi})">⏮ Carry over Q${ui.qi}</button>`:""}
      <button class="btn ghost sm" onclick="rotateAreas(${ui.qi})">🔄 Rotate areas</button>
    </div>
    <button class="btn ghost sm" style="width:100%;margin-top:7px" onclick="clearQ(${ui.qi})">✕ Clear this quarter</button>`;
  if(ui.qi>0) h+=`<div class="muted" style="font-size:11.5px;margin-top:8px">Plan this quarter anytime · <b>Carry over Q${ui.qi}</b> starts it from Q${ui.qi}'s final players.</div>`;
  h+=`<div class="ltlabel" style="margin-top:12px">Bench (${bench.length})</div>
    <div class="bench" data-dropbench="1" style="margin-top:5px">`;
  if(bench.length) bench.forEach(p=>{ h+=`<span class="chip" data-drag="bench" data-pid="${p}">${esc(firstName(name(p)))}</span>`; });
  else h+=`<span class="muted" style="font-size:13px">Everyone present is on the field. Drag a player here to bench them.</span>`;
  h+=`</div></div>`;
  const emptySlots=FORMATIONS[q.formation].slots.filter(s=>!q.lineup[s.id]).length;
  if(activeP.length && emptySlots>0) h+=`<div class="bench" style="margin-top:6px"><span class="chip warn">${emptySlots} open position${emptySlots>1?"s":""}</span></div>`;
  return h;
}

function renderPlayingTimeScreen(){
  const g=curGame();
  if(!g) return emptyGameState("Playing time","Open or start a game to track playing time.");
  const mm=gameMinutes(g); const present=g.present||[];
  const target=targetFor(g); const fair=fairShare(g); const custom=(g.targetMin!=null&&g.targetMin!=="");
  let h=`<button class="backlink" onclick="backToMore()">‹ More</button>`;
  h+=`<div class="scrhead"><div class="bigtitle">Playing time</div><div class="subtitle">Target ${fmt(target)}′ each · goalie time excluded</div></div>`;
  h+=`<div class="row" style="gap:6px;margin:0 0 10px"><input type="number" inputmode="decimal" min="0" max="${QLEN*4}" step="1" style="width:80px" value="${custom?g.targetMin:""}" placeholder="${fmt(fair)}" onchange="setTarget(this.value)"><span class="muted" style="font-size:12px">min target ${custom?"(custom)":"(fair share)"} — clear to reset</span></div>`;
  h+=`<button class="btn wide" onclick="autoRotateGame()"><svg width="17" height="17" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 11h4l2-5 4 12 2-7h4"/></svg> Auto-plan the game</button>`;
  h+=`<div class="legend">
    <span><i style="background:var(--gk)"></i>GK</span><span><i style="background:var(--d)"></i>Def</span>
    <span><i style="background:var(--m)"></i>Mid</span><span><i style="background:var(--f)"></i>Fwd</span>
    <span class="tickleg"><i></i>${fmt(target)}′ target</span>
  </div>`;
  if(!present.length){ h+=`<div class="empty">Check players in on the Roster tab first.</div>`; return h; }
  const list=present.map(pid=>({pid, m:mm[pid]||{total:0,q:[0,0,0,0],grp:{GK:0,D:0,M:0,F:0}}})).sort((a,b)=>a.m.total-b.m.total);
  const maxBar=Math.max(target*1.3, ...list.map(r=>r.m.total), 1);
  list.forEach(r=>{
    const stt=ptStatus(r.m.total,target);
    const gk=isGK(r.pid);
    const diff=Math.round(r.m.total-target);
    const diffLbl = gk? "Keeper" : (stt.k==="on"? "On" : (diff>0? "+"+diff : String(diff)));
    const g4=r.m.grp;
    let segHtml="";
    GRP_ORDER.forEach(k=>{ const v=g4[k]||0; if(v>0) segHtml+=`<div style="width:${(v/maxBar*100).toFixed(1)}%;background:var(--${k.toLowerCase()})"></div>`; });
    const tickPct=Math.min(100, target/maxBar*100);
    const numColor = gk?"var(--muted)": (stt.k==="short"?"var(--red)": stt.k==="over"?"var(--amber)":"var(--green)");
    h+=`<div class="ptrow">
      <div class="row" style="gap:10px;margin-bottom:6px">
        <div class="jrsy" style="width:30px;height:30px;font-size:13px${gk?';background:var(--blue)':''}">${esc(jerseyLabel(r.pid))}</div>
        <span style="flex:1;font:600 14px 'Barlow',sans-serif;color:var(--ink)">${esc(name(r.pid))}${gk?' <span style="font:700 10px \'Barlow\';color:var(--blue-light)">GK</span>':''}</span>
        <span style="font:800 16px 'Barlow Semi Condensed',sans-serif;color:${numColor}">${fmt(r.m.total)}′</span>
        <span class="diffchip ${gk?'gk':stt.k}">${diffLbl}</span>
      </div>
      <div class="segbar">${segHtml}${gk?'':`<div class="tick" style="left:${tickPct}%"></div>`}</div>
    </div>`;
  });
  return h;
}

function seasonStats(){
  const stats={}; state.roster.forEach(p=>stats[p.id]={total:0,grp:{GK:0,D:0,M:0,F:0},games:0,goals:0,assists:0});
  state.games.forEach(g=>{ const mm=gameMinutes(g);
    (g.present||[]).forEach(pid=>{ if(stats[pid]) stats[pid].games++; });
    Object.keys(mm).forEach(pid=>{ if(!stats[pid])return; stats[pid].total+=mm[pid].total;
      GRP_ORDER.forEach(gr=>stats[pid].grp[gr]+=mm[pid].grp[gr]); });
    (g.goals||[]).forEach(gl=>{ if(gl.scorer&&stats[gl.scorer]) stats[gl.scorer].goals++; if(gl.assist&&stats[gl.assist]) stats[gl.assist].assists++; });
  });
  let w=0,l=0,t=0;
  state.games.forEach(g=>{ if((g.goals&&g.goals.length)||(g.them!==""&&g.them!=null)){ const us=ourScore(g),them=(g.them!==""&&g.them!=null)?+g.them:0; if(us>them)w++;else if(us<them)l++;else t++; } });
  return {stats, record:{w,l,t}, gamesCount:state.games.length};
}
function seasonSummaryText(){
  const {stats,record,gamesCount}=seasonStats();
  const DIV="––––––––––––––––––––";
  const L=[];
  L.push("⚽ "+(state.settings.teamName||"Team")+" — Season Summary");
  L.push(gamesCount+" game"+(gamesCount>1?"s":"")+" logged  ·  Record "+record.w+"-"+record.l+"-"+record.t);
  L.push("");
  L.push(DIV); L.push("⏱ TOTAL MINUTES  (sorted low → high)"); L.push(DIV);
  const rows=state.roster.map(p=>({p,s:stats[p.id]})).sort((a,b)=>a.s.total-b.s.total);
  rows.forEach(r=>{ const avg=r.s.games? r.s.total/r.s.games : 0;
    L.push(r.p.name+" — "+fmt(r.s.total)+" min over "+r.s.games+" gm"+(r.s.games!==1?"s":"")+(r.s.games?"  ·  "+fmt(avg)+" avg/gm":"")); });
  L.push(""); L.push(DIV); L.push("📍 MINUTES BY POSITION  (GK / Def / Mid / Fwd)"); L.push(DIV);
  rows.forEach(r=>{ const gp=r.s.grp; L.push(r.p.name+" — "+fmt(gp.GK||0)+" / "+fmt(gp.D||0)+" / "+fmt(gp.M||0)+" / "+fmt(gp.F||0)); });
  const scorers=state.roster.map(p=>({p,s:stats[p.id]})).filter(r=>r.s.goals||r.s.assists)
    .sort((a,b)=>(b.s.goals+b.s.assists)-(a.s.goals+a.s.assists)||b.s.goals-a.s.goals);
  if(scorers.length){
    L.push(""); L.push(DIV); L.push("⚽ GOALS & ASSISTS"); L.push(DIV);
    scorers.forEach(r=>{ L.push(r.p.name+" — "+r.s.goals+" G, "+r.s.assists+" A"); });
  }
  return L.join("\n");
}

  h+=`</table>`;
  h+=`<h3 style="margin:18px 0 8px;font-size:15px;color:#13235a;border-bottom:2px solid #e3e7f0;padding-bottom:5px">📍 Minutes by Position <span style="font-weight:400;color:#697089;font-size:12.5px">(GK / Def / Mid / Fwd)</span></h3>`;
  h+=`<table style="width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:8px">`;
  rows.forEach((r,i)=>{ const gp=r.s.grp; const bg=i%2?"#f7f8fb":"#ffffff";
    h+=`<tr style="background:${bg}"><td style="padding:6px 8px 6px 0;font-weight:600">${esc(r.p.name)}</td><td style="padding:6px 0;color:#697089">${fmt(gp.GK||0)} / ${fmt(gp.D||0)} / ${fmt(gp.M||0)} / ${fmt(gp.F||0)}</td></tr>`; });
  h+=`</table>`;
  const scorers=state.roster.map(p=>({p,s:stats[p.id]})).filter(r=>r.s.goals||r.s.assists)
    .sort((a,b)=>(b.s.goals+b.s.assists)-(a.s.goals+a.s.assists)||b.s.goals-a.s.goals);
  if(scorers.length){
    h+=`<h3 style="margin:18px 0 8px;font-size:15px;color:#13235a;border-bottom:2px solid #e3e7f0;padding-bottom:5px">⚽ Goals &amp; Assists</h3>`;
    h+=`<table style="width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:8px">`;
    scorers.forEach((r,i)=>{ const bg=i%2?"#f7f8fb":"#ffffff";
      h+=`<tr style="background:${bg}"><td style="padding:6px 8px 6px 0;font-weight:600">${esc(r.p.name)}</td><td style="padding:6px 8px;color:#697089">${r.s.goals} G</td><td style="padding:6px 0;color:#697089">${r.s.assists} A</td></tr>`; });
    h+=`</table>`;
  }
  h+=`</div>`;
  return h;
}
function emailSeasonSummary(){
  const subj=(state.settings.teamName||"Team")+" – season totals";
  const body=seasonSummaryText();
  window.location.href="mailto:?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
}
function copySeasonSummary(){
  const txt=seasonSummaryText();
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>alert("Summary copied.")).catch(()=>fallbackCopy(txt)); }
  else fallbackCopy(txt);
}
function copySeasonSummaryHTML(){
  const html=seasonSummaryHTML(), text=seasonSummaryText();
  if(navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem!=="undefined"){
    const item=new ClipboardItem({ "text/html": new Blob([html],{type:"text/html"}), "text/plain": new Blob([text],{type:"text/plain"}) });
    navigator.clipboard.write([item])
      .then(()=>alert("Formatted season summary copied — paste it into a new email to keep the table."))
      .catch(()=>fallbackCopy(text,"Your browser blocked rich copying, so I copied the plain-text version instead."));
  } else {
    fallbackCopy(text,"Your browser doesn't support rich copying here, so I copied the plain-text version instead.");
  }
}
function setSubAlertThreshold(v){ const n=Math.max(1,Math.min(QLEN,parseFloat(v)||6)); state.settings.subAlertThreshold=n; save(); render(); }
function addPlayer(){ state.roster.push({id:uid("p"),name:"New player",gk:false,notes:""}); save(); render(); }
function toggleGK(id){ const p=state.roster.find(x=>x.id===id); if(p){ p.gk=!p.gk; save(); render(); } }
function setNumber(id,v){ const p=state.roster.find(x=>x.id===id); if(p){ p.number=(v===""||v==null)?null:String(v).trim(); save(); render(); } }
function renamePlayer(id,v){ const p=state.roster.find(x=>x.id===id); if(p)p.name=v.trim()||p.name; save(); }
function setNotes(id,v){ const p=state.roster.find(x=>x.id===id); if(p){ p.notes=v; save(); } }
function removePlayer(id){ if(!confirm("Remove this player from the roster? Past game data stays intact."))return;
  state.roster=state.roster.filter(p=>p.id!==id); save(); render(); }
function setTeam(v){ state.settings.teamName=v; save(); render(); }
function setDefFormation(v){ state.settings.defaultFormation=v; save(); }
function doExport(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  const d=new Date().toISOString().slice(0,10);
  a.href=url; a.download="soccer-tracker-backup-"+d+".json"; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },500);
}
function doImport(file){ if(!file)return; const r=new FileReader();
  r.onload=e=>{ try{ const obj=JSON.parse(e.target.result);
    if(!obj.roster||!obj.games){ alert("That doesn't look like a tracker backup."); return; }
    if(!confirm("Replace all current data with this backup?")) return;
    state=obj; if(!state.settings)state.settings={defaultFormation:"3-3-1",teamName:"Team"}; save(); go("games");
  }catch(err){ alert("Could not read that file."); } };
  r.readAsText(file);
}
function doReset(){ if(!confirm("Erase ALL data and restore the original roster?"))return;
  if(!confirm("Are you sure? This cannot be undone (export a backup first if unsure)."))return;
  state=defaultState(); save(); go("games"); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function firstName(n){ return (n||"").split(" ")[0]; }
function initials(n){ n=(n||"").trim(); if(!n) return ""; const p=n.split(/\s+/);
  return (p.length>1 ? (p[0][0]+p[1][0]) : n.slice(0,2)).toUpperCase(); }
//// ---------- drag & drop (touch + mouse) ----------
let drag=null;
function setupDrag(){
  const app=document.getElementById("app");
  app.addEventListener("pointerdown",onDragStart);
  window.addEventListener("pointermove",onDragMove,{passive:false});
  window.addEventListener("pointerup",onDragEnd);
  window.addEventListener("pointercancel",onDragCancel);
}
function onDragStart(e){
  if(drag) return; // a drag is already in progress — ignore extra touches
  if(ui.view!=="lineup") return;
  const el=e.target.closest("[data-drag]"); if(!el) return;
  drag={pid:el.dataset.pid||"", from:el.dataset.drag, slot:el.dataset.slot||null, moved:false, x0:e.clientX, y0:e.clientY, pointerId:e.pointerId};
}
function onDragMove(e){
  if(!drag || (drag.pointerId!=null && e.pointerId!==drag.pointerId)) return;
  if(!drag.moved){
    if(Math.hypot(e.clientX-drag.x0,e.clientY-drag.y0)<8) return;
    if(!drag.pid){ return; } // empty slot: no drag source, allow tap
    drag.moved=true; makeGhost(drag.pid,e.clientX,e.clientY); document.body.classList.add("dragging");
  }
  e.preventDefault();
  moveGhost(e.clientX,e.clientY);
  hoverTarget(e.clientX,e.clientY);
}
function onDragEnd(e){
  if(!drag || (drag.pointerId!=null && e.pointerId!==drag.pointerId)) return;
  if(drag.moved){
    const t=targetAt(e.clientX,e.clientY);
    cleanupDrag();
    if(t&&t.slot) dropOnSlot(drag.pid, drag.from==="slot"?drag.slot:null, t.slot);
    else if(t&&t.bench && drag.from==="slot") benchFromSlot(drag.slot);
  } else {
    if(drag.from==="slot" && drag.slot) openPicker(ui.qi, drag.slot);
  }
  drag=null;
}
function onDragCancel(e){ if(drag && drag.pointerId!=null && e && e.pointerId!==drag.pointerId) return; cleanupDrag(); drag=null; }
function cleanupDrag(){
  document.querySelectorAll(".dragbubble").forEach(g=>g.remove()); // remove ALL stray bubbles
  document.querySelectorAll(".slot.dragover").forEach(s=>s.classList.remove("dragover"));
  document.querySelectorAll(".benchover").forEach(b=>b.classList.remove("benchover"));
  document.body.classList.remove("dragging");
}
function makeGhost(pid,x,y){ const d=document.createElement("div"); d.className="dragbubble"; d.textContent=firstName(name(pid));
  d.style.left=(x||0)+"px"; d.style.top=(y||0)+"px"; document.body.appendChild(d); }
function moveGhost(x,y){ const d=document.querySelector(".dragbubble"); if(d){ d.style.left=x+"px"; d.style.top=y+"px"; } }
function targetAt(x,y){
  const g=document.querySelector(".dragbubble"); if(g)g.style.display="none";
  const el=document.elementFromPoint(x,y); if(g)g.style.display="";
  if(!el) return null;
  const slot=el.closest(".slot"); if(slot&&slot.dataset.slot) return {slot:slot.dataset.slot};
  const bench=el.closest("[data-dropbench]"); if(bench) return {bench:true};
  return null;
}
function hoverTarget(x,y){
  document.querySelectorAll(".slot.dragover").forEach(s=>s.classList.remove("dragover"));
  document.querySelectorAll(".benchover").forEach(b=>b.classList.remove("benchover"));
  const t=targetAt(x,y);
  if(t&&t.slot){ const s=document.querySelector('.slot[data-slot="'+t.slot+'"]'); if(s)s.classList.add("dragover"); }
  else if(t&&t.bench){ const b=document.querySelector("[data-dropbench]"); if(b)b.classList.add("benchover"); }
}
function dropOnSlot(pid, fromSlot, targetSlot){
  if(!pid || fromSlot===targetSlot) return;
  const g=curGame(); const q=g.quarters[ui.qi];
  const targetPid=q.lineup[targetSlot]||null;
  Object.keys(q.lineup).forEach(s=>{ if(q.lineup[s]===pid) delete q.lineup[s]; });
  q.lineup[targetSlot]=pid;
  if(fromSlot && targetPid && targetPid!==pid) q.lineup[fromSlot]=targetPid; // swap
  save(); render();
}
function benchFromSlot(slot){ const g=curGame(); const q=g.quarters[ui.qi]; delete q.lineup[slot]; save(); render(); }
//// ---------- init ----------
document.querySelectorAll("nav.tabbar button").forEach(b=>b.addEventListener("click",()=>goTab(b.dataset.nav)));
setupDrag();
load();
QLEN = state.settings.quarterLen || 12;
render();
// Register the service worker so the app keeps working with no signal at the field.
// Fails silently if unsupported (older browsers) — the app still works online either way.
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}
